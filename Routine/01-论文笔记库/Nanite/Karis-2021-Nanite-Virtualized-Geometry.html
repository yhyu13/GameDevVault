<style>

  .progress-bar { height: 6px; background: var(--border); border-radius: 3px; overflow: hidden; margin-bottom: 16px; }

  .btn {

  .overview-grid {

  .overview-tile {

    display: flex; flex-direction: column; align-items: center; justify-content: center;

  }
  .overview-tile:hover { transform: scale(1.05); }
  .overview-tile.correct { background: var(--correct-bg); border-color: var(--correct); }
  .overview-tile.wrong { background: var(--wrong-bg); border-color: var(--wrong); }

  .results-screen { display: none; text-align: center; padding: 40px 20px; }

  .score-circle {

  .score-value { font-size: 3rem; font-weight: 700; line-height: 1; }
  .score-label { font-size: 1rem; opacity: 0.85; }
  .results-title { font-size: 1.4rem; font-weight: 600; margin-bottom: 8px; }
  .results-msg { color: var(--muted); margin-bottom: 24px; }
  .review-section { margin-top: 32px; text-align: left; }
  .review-item { padding: 12px 16px; background: var(--card); border-radius: 8px; margin-bottom: 8px; border-left: 3px solid var(--wrong); }
  .review-item h4 { font-size: 0.92rem; margin: 0 0 6px; }
  .your-ans { color: var(--wrong); font-weight: 600; }
  .correct-ans { color: var(--correct); font-weight: 600; }
</style>

<div class="container">
  <header>
    <h1>Nanite 虚拟几何管线 — 论文卡牌</h1>

    <div class="header-meta">配套笔记: <a href="Karis-2021-Nanite-Virtualized-Geometry.md">[[Karis-2021-Nanite-Virtualized-Geometry]]</a> · W29 配套 · 12 题</div>

<script>
const TYPE_LABEL = { TF: '判断题', SC: '单选题', MC: '多选题', DRAG: '拖拽填空' };

const quizData = [
  {
    type: "TF",
    id: 1,
    question: "Nanite 离线构建时把高模切分成 128-tri Cluster，Cluster 是 coherent（邻接 + 法线连续 + LOD 兼容）的，不是简单地按三角形数切。",
    answer: true,
    src: "Karis-2021-Nanite-Virtualized-Geometry.md §核心创新点 1",
    explanation: "正确。Nanite Cluster 切分是 SIGGRAPH 2021 论文的核心难点——不是简单按三角形数切，要保证 Cluster 内邻接 + 法线连续 + LOD 兼容（不同 LOD 间 Cluster 边界对齐）。128 是经验值：足够小让一个 Cluster 在大多数屏幕距离下退化到亚像素，足够大让 Cluster tree 总层数可控。",
    followup: [
      "追问：为什么不是 64 或 256？",
      "答：128 是 Karis 6 个月工程迭代的经验值。64 → Cluster tree 层数翻倍，遍历开销大；256 → 单个 Cluster 在近场不会退化到亚像素，软件光栅化触发条件失效。"
    ]
  },
  {
    type: "SC",
    id: 2,
    question: "Nanite 用 Visibility Buffer 替代传统 G-Buffer 的根本原因是？",
    options: [
      "A. 64-bit 比 32-bit 精度更高，几何定位更准确",
      "B. 省 5-8x 带宽（1 个 32-bit RT vs 5-8 个 MRT）+ micro-triangle 友好（避免硬件 quad overdraw）",
      "C. VisBuffer 可以替代深度缓冲，省一张 RT",
      "D. VisBuffer64 是 D3D12 强制要求的格式"
    ],
    answer: 1,
    src: "Karis-2021-Nanite-Virtualized-Geometry.md §核心创新点 3 + 面试谈资 Q2",
    explanation: "B 正确。G-Buffer 5-8 个 MRT (Albedo / Normal / Roughness / Metallic / Emissive / Depth) → 5-8x 带宽。Visibility Buffer 1 个 32-bit (PrimID + TriID + Barycentric) → material shading 阶段从 VS 重新计算 attribute。**省 5-8x 带宽（Mac / mobile 关键）+ micro-triangle 友好**。A 错：64-bit 不是为了精度；C 错：VisBuffer 不替代深度；D 错：D3D12 没这个要求。",
    followup: [
      "追问：64-bit atomic 在不支持的硬件上怎么办？",
      "答：走 LockBufferFallback 路径——SW 路径用 RWTexture<uint> LockBuffer 模拟 CAS 操作，性能显著下降。D3D11 老硬件走这条。移动端基本不跑 Nanite——移动 GPU 普遍缺少 64-bit atomic 支持。"
    ]
  },
  {
    type: "MC",
    id: 3,
    question: "Nanite 5.4 相比 5.0 做了哪些关键改进？（多选）",
    options: [
      "A. 引入 Compute Shader + Bin 合并算法，把 4015 个 shading bin 中的 3675 个空 bin 合并",
      "B. 减少 80% 空调度（draw call 数从 ~4015 降到 ~340）",
      "C. WPO（世界位置偏移）支持完整可用（草 / 树 / 风动物体可开 Nanite）",
      "D. 软件光栅化完全取代硬件光栅化",
      "E. 引入可编程光栅器（Programmable Rasterizer）",
      "F. VisBuffer 升级到 128-bit"
    ],
    answer: [0, 1, 2, 4],
    src: "Karis-2021-Nanite-Virtualized-Geometry.md §核心创新点 4 + GDC 2024 Karis 演讲",
    explanation: "A、B、C、E 正确——GDC 2024 Karis 演讲原话：5.4 引入 Compute Shader + Bin 合并算法，把 4015 bin 中 3675 个空 bin 合并，空调度降低 80%。5.4 之前 WPO 不支持（5.4 引入可编程光栅器后才支持）。D 错：5.4 不是软件光栅化取代硬件，是混合调度模式优化（HardwareThenSoftware 默认）。F 错：VisBuffer 仍是 64-bit（5.4 没变）。",
    followup: [
      "追问：5.0 升 5.4 之后材质性能会立刻提升吗？",
      "答：会自动启用新管线，但收益取决于场景的材质多样性——材质数 < 100 的简单场景收益小，材质数 > 1000 的复杂场景收益大（2x+）。"
    ]
  },
  {
    type: "DRAG",
    id: 4,
    question: "Nanite 4 大核心创新：① 离线切 {0}（128-tri coherent）→ ② GPU 运行时 {1}（HZB 裁剪）→ ③ {2} Buffer 替代 G-Buffer → ④ 材质 {3} 调度（5.4 减少 80% 空调度）。",
    blanks: [
      { idx: 0, expected: "Cluster" },
      { idx: 1, expected: "GPU-Driven Culling" },
      { idx: 2, expected: "Visibility" },
      { idx: 3, expected: "Bin" }
    ],
    pool: ["Cluster", "GPU-Driven Culling", "Visibility", "Bin", "LOD", "Texture", "Page", "Atomic"],
    src: "Karis-2021-Nanite-Virtualized-Geometry.md §核心创新点 1-4",
    explanation: "正确填空：{0}=Cluster（128-tri coherent 切分）→{1}=GPU-Driven Culling（HZB 视锥 / 遮挡裁剪全部 GPU 并行）→{2}=Visibility Buffer（替代 G-Buffer 省 5-8x 带宽）→{3}=Bin（5.4 材质 bin 合并减少 80% 空调度）。LOD 是运行时决策不是创新、Texture / Page / Atomic 是辅助概念。",
    followup: [
      "追问：Cluster 切分 vs NVIDIA Meshlet 的区别？",
      "答：Meshlet = GPU primitive pipeline 最小单元，'SIMD-coherent 三角形组'。Nanite Cluster = BVH 节点 + 128-tri + 邻接 + LOD 兼容，比 Meshlet 多 LOD 元数据，可以做运行时 GPU 选 LOD。"
    ]
  },
  {
    type: "TF",
    id: 5,
    question: "Nanite 的软件光栅化路径处理 50-80% 的 micro-triangle（< 1 像素），避免硬件光栅的 quad overdraw。",
    answer: true,
    src: "Karis-2021-Nanite-Virtualized-Geometry.md §实现难点分析 3",
    explanation: "正确。Karis 自己说 SW 路径处理 50-80% micro-triangle（distant + small material detail 时三角形大量 < 1 像素）。硬件光栅化在亚像素级时 quad overdraw 灾难（4x4 像素 quad 浪费）。SW 路径用 SIMD lane mask 高效处理，**这是 Nanite 性能的关键优化**。",
    followup: [
      "追问：为什么不全用软件光栅化？",
      "答：硬件光栅化在处理大三角形（> 几十像素）时效率远超 SW（直接走 ROP 带宽）。Nanite 走混合模式：HW 处理大三角形，SW 处理小三角形，由 r.Nanite.RasterScheduling 控制。"
    ]
  },
  {
    type: "SC",
    id: 6,
    question: "HZB（Hierarchical Z-Buffer）在 Nanite 中的作用是？",
    options: [
      "A. 缓存上一帧的 color buffer 减少 PS 采样",
      "B. 上一帧 depth 构造 mip 链，本帧做 conservative occlusion 裁剪（< 0.1ms 开销）",
      "C. 把多个 mesh 的 depth 合并成一张大图减少 RT 数",
      "D. 是 D3D12 / Vulkan 强制要求的硬件特性"
    ],
    answer: 1,
    src: "Karis-2021-Nanite-Virtualized-Geometry.md §核心创新点 2 + 面试谈资 Q4",
    explanation: "B 正确。HZB 从上一帧 depth 构造 mip chain（5x5 downsample × log2 层）。本帧做 conservative occlusion query——若 Cluster 在屏幕投影后被 HZB 中更近的 depth 遮挡，剔除。**实际开销 < 0.1ms**，是 Nanite 性能的核心优化。A 错：缓存 color 不是 HZB；C 错：不是合并 depth；D 错：HZB 是 Nanite 自建，不是 D3D12 强制。",
    followup: [
      "追问：HZB 构造在什么线程跑？",
      "答：RenderThread 端、Compute Shader 多线程 mip 构造（5x5 downsample），跟 Nanite 的 cull pass 并行。开启 r.Nanite.HZB.AsyncCompute 1 可以走 Async Compute（实验性）。"
    ]
  },
  {
    type: "MC",
    id: 7,
    question: "Nanite 在 Mac 上跑有什么坑？（多选）",
    options: [
      "A. Metal RHI 早期版本没有硬件光栅的 wave intrinsics，Software Raster 路径必须支持",
      "B. 带宽敏感 → 优先选 Visibility Buffer 路径而不是 legacy G-Buffer",
      "C. Metal RHI 5.0 之前 page residency 有 bug，5.4+ 修复",
      "D. 移动端 GPU 普遍缺少 64-bit atomic 支持，Nanite 走 LockBufferFallback 性能下降 30-50%",
      "E. Mac 上完全不能跑 Nanite，没有任何支持",
      "F. 5.4+ 的材质 bin 调度在 Mac 上会崩溃"
    ],
    answer: [0, 1, 2, 3],
    src: "Karis-2021-Nanite-Virtualized-Geometry.md §个人评价-局限性 + 面试谈资 Q5",
    explanation: "A、B、C、D 正确——这些是 Mac / 移动端跑 Nanite 的实际坑。E 错：Mac 完全可以跑 Nanite（5.0+），只是要关注上述细节。F 错：5.4 材质 bin 调度在 Mac 上稳定，没有崩溃问题。",

/* ====== 状态 ====== */
let current = 0;
let answers = new Array(quizData.length).fill(null);
let pendingAnswers = new Array(quizData.length).fill(null);
let dragState = new Array(quizData.length).fill(null);
let score = 0;
let currentFilter = 'all';

/* ====== 渲染 ====== */
function renderQuestion(idx) {
  const q = quizData[idx];
  const container = document.getElementById('quizContainer');
  const answered = answers[idx] !== null;
  let html = `<div class="question-card ${answered ? 'answered' : ''}">`;
  html += `<div class="q-number">题目 ${idx + 1} / ${quizData.length} <span class="q-type-badge">${TYPE_LABEL[q.type]}</span></div>`;
  html += `<div class="q-text">${q.question}</div>`;

  if (q.type === 'TF') {
    const selected = pendingAnswers[idx] !== null ? pendingAnswers[idx] : answers[idx];
    html += `<div class="tf-buttons">`;
    html += `<button class="tf-btn ${selected === true ? 'selected' : ''} ${tfClass(idx, true)}" onclick="selectTF(true)" ${answered?'disabled':''}>✅ True</button>`;
    html += `<button class="tf-btn ${selected === false ? 'selected' : ''} ${tfClass(idx, false)}" onclick="selectTF(false)" ${answered?'disabled':''}>❌ False</button>`;
    html += `</div>`;
    if (!answered && selected !== null) {
      html += `<button class="btn btn-primary" style="margin-top:12px" onclick="submitTF()">确认答案</button>`;
    }
  } else if (q.type === 'SC') {
    const selected = pendingAnswers[idx] !== null ? pendingAnswers[idx] : answers[idx];
    html += `<div class="options">`;
    q.options.forEach((opt, i) => {
      const cls = answered ? scClass(idx, i) : (selected === i ? 'selected' : '');
      html += `<div class="option ${cls}" onclick="selectSC(${i})">`;
      html += `<span class="option-key">${String.fromCharCode(65 + i)}</span><span>${opt.replace(/^[A-Z]\.\s*/, '')}</span></div>`;
    });
    html += `</div>`;
    if (!answered && selected !== null) {
      html += `<button class="btn btn-primary" style="margin-top:12px" onclick="submitSC()">确认答案</button>`;
    }
  } else if (q.type === 'MC') {
    const currentAns = answers[idx] || pendingAnswers[idx] || [];
    html += `<div class="options">`;
    q.options.forEach((opt, i) => {
      const sel = currentAns.includes(i);
      const cls = answered ? mcClass(idx, i) : (sel ? 'selected' : '');
      html += `<div class="option ${cls}" onclick="toggleMC(${i})">`;
      html += `<span class="option-key">${sel ? '☑' : '☐'}</span><span>${opt.replace(/^[A-Z]\.\s*/, '')}</span></div>`;
    });
    html += `<button class="btn btn-primary" style="margin-top:12px" onclick="submitMC()" ${answered?'disabled':''}>确认答案</button>`;
    html += `</div>`;
  } else if (q.type === 'DRAG') {
    const currentDrag = dragState[idx] || new Array(q.blanks.length).fill(null);
    html += `<div class="drag-zone" id="dragZone">`;
    q.blanks.forEach((b, i) => {
      const filled = currentDrag[i];
      const slotCls = answered ? dragSlotClass(idx, i) : (filled ? 'filled' : '');
      html += `<div class="drag-slot ${slotCls}" data-slot="${i}" onclick="${answered ? '' : `clearSlot(${i})`}">${filled || '（拖入）'}</div>`;
    });
    html += `</div>`;
    html += `<div class="drag-pool" id="dragPool">`;
    q.pool.forEach((term, i) => {
      const used = currentDrag.includes(term);
      const chipCls = used ? 'used' : '';
      html += `<div class="drag-chip ${chipCls}" draggable="${!used && !answered}" ondragstart="dragStart(event, ${i})" onclick="${answered ? '' : `fillSlot(${i})`}">${term}</div>`;
    });
    html += `</div>`;
    if (!answered) {
      html += `<button class="btn btn-primary" style="margin-top:12px" onclick="submitDRAG()">提交</button>`;
    }
  }

  html += `<div class="explanation ${exClass(idx)} ${answered?'show':''}">`;
  html += `<strong>${isCorrect(idx) ? '✅ 正确!' : '❌ 错误'}</strong><br>${q.explanation}`;
  if (q.followup && q.followup.length) {
    html += `<div class="followup"><h4>面试官可能的追问：</h4><ol>`;
    q.followup.forEach(f => { html += `<li>${f}</li>`; });
    html += `</ol></div>`;
  }
  html += `<div class="src">来源：${q.src}</div>`;
  html += `</div></div>`;
  container.innerHTML = html;

  if (q.type === 'DRAG' && !answered) {
    const slots = container.querySelectorAll('.drag-slot');
    slots.forEach(s => {
      s.addEventListener('dragover', e => { e.preventDefault(); s.classList.add('drag-over'); });
      s.addEventListener('dragleave', () => s.classList.remove('drag-over'));
      s.addEventListener('drop', e => {
        e.preventDefault(); s.classList.remove('drag-over');
        const termIdx = parseInt(e.dataTransfer.getData('text/plain'));
        dropOnSlot(termIdx, parseInt(s.dataset.slot));
      });
    });
  }

  updateNav();
  updateProgress();
}

/* ====== 答案判定辅助 ====== */
function tfClass(idx, val) {
  if (answers[idx] === null && pendingAnswers[idx] === null) return '';
  const correct = quizData[idx].answer === val;
  const chosen = (answers[idx] !== null ? answers[idx] : pendingAnswers[idx]) === val;
  if (correct) return 'correct';
  if (chosen) return 'wrong';
  return '';
}
function scClass(idx, val) {
  if (answers[idx] === null && pendingAnswers[idx] === null) return '';
  const correct = quizData[idx].answer === val;
  const chosen = (answers[idx] !== null ? answers[idx] : pendingAnswers[idx]) === val;
  if (correct) return 'correct';
  if (chosen) return 'wrong';
  return '';
}
function mcClass(idx, val) {
  const ans = answers[idx] || pendingAnswers[idx] || [];
  if (answers[idx] === null && pendingAnswers[idx] === null) return '';
  const correct = quizData[idx].answer.includes(val);
  const chosen = ans.includes(val);
  if (correct) return 'correct';
  if (chosen) return 'wrong';
  return '';
}
function dragSlotClass(idx, slot) {
  if (answers[idx] === null) return '';
  const expected = quizData[idx].blanks[slot].expected;
  const actual = (dragState[idx] || [])[slot];
  return actual === expected ? 'correct' : 'wrong';
}
function exClass(idx) {
  if (answers[idx] === null) return '';
  return isCorrect(idx) ? 'correct-ex' : 'wrong-ex';
}
function isCorrect(idx) {
  const q = quizData[idx];
  if (answers[idx] === null && pendingAnswers[idx] === null) return false;
  const ans = answers[idx] !== null ? answers[idx] : pendingAnswers[idx];
  if (q.type === 'TF') return ans === q.answer;
  if (q.type === 'SC') return ans === q.answer;
  if (q.type === 'MC') {
    const a = [...ans].sort().join(',');
    const c = [...q.answer].sort().join(',');
    return a === c;
  }
  if (q.type === 'DRAG') {
    const ds = dragState[idx] || [];
    return q.blanks.every((b, i) => ds[i] === b.expected);
  }
  return false;
}

/* ====== 作答 ====== */
function selectTF(val) {
  if (answers[current] !== null) return;
  pendingAnswers[current] = val;
  renderQuestion(current);
}
function submitTF() {
  if (answers[current] !== null) return;
  if (pendingAnswers[current] === null) return;
  answers[current] = pendingAnswers[current];
  pendingAnswers[current] = null;
  if (isCorrect(current)) score += 10;
  renderQuestion(current);
  updateOverview();
}
function selectSC(val) {
  if (answers[current] !== null) return;
  pendingAnswers[current] = val;
  renderQuestion(current);
}
function submitSC() {
  if (answers[current] !== null) return;
  if (pendingAnswers[current] === null) return;
  answers[current] = pendingAnswers[current];
  pendingAnswers[current] = null;
  if (isCorrect(current)) score += 10;
  renderQuestion(current);
  updateOverview();
}
function toggleMC(val) {
  if (answers[current] !== null) return;
  let a = pendingAnswers[current] || [];
  if (a.includes(val)) a = a.filter(x => x !== val);
  else a = [...a, val];
  pendingAnswers[current] = a;
  renderQuestion(current);
}
function submitMC() {
  if (answers[current] !== null) return;
  if ((pendingAnswers[current] || []).length === 0) {
    alert('请至少选择一个选项');
    return;
  }
  answers[current] = pendingAnswers[current];
  pendingAnswers[current] = null;
  if (isCorrect(current)) score += 10;
  renderQuestion(current);
  updateOverview();
}
function dragStart(e, termIdx) {
  e.dataTransfer.setData('text/plain', termIdx);
}
function fillSlot(termIdx) {
  const q = quizData[current];
  const term = q.pool[termIdx];
  const ds = dragState[current] || new Array(q.blanks.length).fill(null);
  if (ds.includes(term)) return;
  for (let i = 0; i < ds.length; i++) {
    if (ds[i] === null) { ds[i] = term; break; }
  }
  dragState[current] = ds;
  renderQuestion(current);
}
function clearSlot(slot) {
  const ds = dragState[current] || [];
  ds[slot] = null;
  dragState[current] = ds.filter(x => x !== null);
  while (dragState[current].length < quizData[current].blanks.length) dragState[current].push(null);
  renderQuestion(current);
}
function dropOnSlot(termIdx, slot) {
  const q = quizData[current];
  const term = q.pool[termIdx];
  const ds = dragState[current] || new Array(q.blanks.length).fill(null);
  if (ds.includes(term)) return;
  ds[slot] = term;
  dragState[current] = ds;
  renderQuestion(current);
}
function submitDRAG() {
  if (answers[current] !== null) return;
  const ds = dragState[current] || [];
  if (ds.filter(x => x !== null).length < quizData[current].blanks.length) {
    alert('请填满所有空位');
    return;
  }
  answers[current] = ds.slice();
  if (isCorrect(current)) score += 10;
  renderQuestion(current);
  updateOverview();
}

/* ====== 导航 ====== */
function goPrev() { if (current > 0) { current--; renderQuestion(current); } }
function goNext() { if (current < quizData.length - 1) { current++; renderQuestion(current); } }
function finishQuiz() { showResults(); }
function updateNav() {
  document.getElementById('prevBtn').disabled = current === 0;
  document.getElementById('nextBtn').style.display = current === quizData.length - 1 ? 'none' : '';
  document.getElementById('finishBtn').style.display = current === quizData.length - 1 ? '' : 'none';
  document.getElementById('progressText').textContent = `${current + 1} / ${quizData.length}`;
  document.getElementById('scoreText').textContent = score;
}
function updateProgress() {
  const pct = ((current + 1) / quizData.length) * 100;
  document.getElementById('progressFill').style.width = pct + '%';
}

/* ====== 总览面板 ====== */
function toggleOverview() {
  const p = document.getElementById('overviewPanel');
  p.classList.toggle('show');
  if (p.classList.contains('show')) updateOverview();
}
function setFilter(f) {
  currentFilter = f;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.toggle('active', b.dataset.filter === f));
  updateOverview();
}
function updateOverview() {
  const grid = document.getElementById('overviewGrid');
  let html = '';
  quizData.forEach((q, i) => {
    const ans = answers[i];
    let cls = '';
    if (ans !== null) {
      cls = isCorrect(i) ? 'correct' : 'wrong';
    }
    if (currentFilter === 'unanswered' && ans !== null) return;
    if (currentFilter === 'correct' && (ans === null || !isCorrect(i))) return;
    if (currentFilter === 'wrong' && (ans === null || isCorrect(i))) return;
    html += `<div class="overview-tile ${cls}" onclick="jumpTo(${i})">`;
    html += `<div class="tile-num">${i + 1}</div>`;
    html += `<div class="tile-type">${TYPE_LABEL[q.type]}</div>`;
    html += `</div>`;
  });
  grid.innerHTML = html;
}
function jumpTo(i) {
  current = i;
  document.getElementById('overviewPanel').classList.remove('show');
  renderQuestion(current);
}

/* ====== 重置 / 完成 ====== */
function resetAll() {
  if (!confirm('确定要清空所有答题记录并重置分数？')) return;
  answers = new Array(quizData.length).fill(null);
  pendingAnswers = new Array(quizData.length).fill(null);
  dragState = new Array(quizData.length).fill(null);
  score = 0;
  current = 0;
  document.getElementById('resultsScreen').classList.remove('show');
  document.getElementById('quizContainer').style.display = '';
  document.getElementById('navBar').style.display = '';
  renderQuestion(current);
  updateOverview();
}
function showResults() {
  document.getElementById('quizContainer').style.display = 'none';
  document.getElementById('navBar').style.display = 'none';
  document.getElementById('resultsScreen').classList.add('show');
  document.getElementById('finalScore').textContent = score;
  const pct = score / (quizData.length * 10) * 100;
  const msg = pct >= 90 ? 'Nanite 大师！可以直接去面试 Epic 了 🎉' :
              pct >= 70 ? '基础扎实，再过几个细节就能讲清楚管线 💪' :
              pct >= 50 ? '概念地图建立中，建议先看一遍配套 paper 笔记 📖' :
                          '回到 [[Karis-2021-Nanite-Virtualized-Geometry]] 重新读一遍，再来！🔁';
  document.getElementById('resultsMsg').textContent = msg;
  let review = '';
  quizData.forEach((q, i) => {
    if (answers[i] !== null && !isCorrect(i)) {
      const ansStr = formatAnswer(q, answers[i]);
      const corrStr = formatAnswer(q, q.answer);
      review += `<div class="review-item"><h4>第 ${i + 1} 题 · ${TYPE_LABEL[q.type]}：${q.question}</h4>`;
      review += `<p>你的答案：<span class="your-ans">${ansStr}</span></p>`;
      review += `<p>正确答案：<span class="correct-ans">${corrStr}</span></p></div>`;
    }
  });
  document.getElementById('reviewSection').innerHTML = review || '<p style="color:var(--muted);text-align:center">全部正确，零错题 🎯</p>';
}
function formatAnswer(q, ans) {
  if (q.type === 'TF') return ans ? 'True' : 'False';
  if (q.type === 'SC') return String.fromCharCode(65 + ans);
  if (q.type === 'MC') return ans.map(i => String.fromCharCode(65 + i)).join(', ');
  if (q.type === 'DRAG') return (ans || []).join(' / ');
  return String(ans);
}
function restartQuiz() { resetAll(); }
function retryWrong() {
  const wrongIdx = quizData.map((q, i) => (!isCorrect(i) && answers[i] !== null) ? i : -1).filter(i => i >= 0);
  if (wrongIdx.length === 0) { alert('没有错题可以重做！'); return; }
  wrongIdx.forEach(i => { answers[i] = null; pendingAnswers[i] = null; dragState[i] = null; });
  score = 0;
  current = wrongIdx[0];
  document.getElementById('resultsScreen').classList.remove('show');
  document.getElementById('quizContainer').style.display = '';
  document.getElementById('navBar').style.display = '';
  renderQuestion(current);
  updateOverview();
}

document.addEventListener('keydown', e => {
  if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;
  if (e.key === 'ArrowLeft') goPrev();
  if (e.key === 'ArrowRight') goNext();
});
renderQuestion(0);
updateOverview();
</script>
