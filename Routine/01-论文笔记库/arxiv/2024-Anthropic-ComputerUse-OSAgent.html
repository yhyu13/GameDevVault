let currentIdx = 0;
const state = quizData.map(() => ({ answered: false, correct: null, userAnswer: null }));

function renderQuestion(idx) {
  const q = quizData[idx];
  const container = document.getElementById('quizContainer');
  const s = state[idx];

  let html = `<div class="question-card ${s.answered ? 'answered' : ''}">`;
  html += `<div class="q-number">第 ${q.id} 题<span class="q-type-badge">${TYPE_LABEL[q.type]}</span></div>`;
  html += `<div class="q-text">${q.question.replace(/\{(\d+)\}/g, '<span style="color:var(--accent-2);font-weight:700;">___</span>')}</div>`;

  if (q.type === 'TF') {
    html += `<div class="tf-buttons">
      <button class="tf-btn ${s.userAnswer === true ? 'selected' : ''}" data-val="true" onclick="selectTF(${idx}, true)" ${s.answered ? 'disabled' : ''}>✅ 正确 (True)</button>
      <button class="tf-btn ${s.userAnswer === false ? 'selected' : ''}" data-val="false" onclick="selectTF(${idx}, false)" ${s.answered ? 'disabled' : ''}>❌ 错误 (False)</button>
    </div>`;
  } else if (q.type === 'SC') {
    html += `<div class="options">`;
    q.options.forEach((opt, i) => {
      let cls = 'option';
      if (s.answered) {
        cls += ' disabled';
        if (i === q.answer) cls += ' correct';
        else if (i === s.userAnswer) cls += ' wrong';
      } else if (s.userAnswer === i) {
        cls += ' selected';
      }
      const key = String.fromCharCode(65 + i);
      html += `<div class="${cls}" onclick="selectSC(${idx}, ${i})"><span class="option-key">${key}.</span><span>${opt}</span></div>`;
    });
    html += `</div>`;
  } else if (q.type === 'MC') {
    html += `<div class="options">`;
    q.options.forEach((opt, i) => {
      let cls = 'option';
      const isSelected = s.userAnswer && s.userAnswer.includes(i);
      if (s.answered) {
        cls += ' disabled';
        if (q.answer.includes(i)) cls += ' correct';
        else if (isSelected) cls += ' wrong';
      } else if (isSelected) {
        cls += ' selected';
      }
      const key = String.fromCharCode(65 + i);
      html += `<div class="${cls}" onclick="selectMC(${idx}, ${i})"><span class="option-key">${key}.</span><span>${opt}</span></div>`;
    });
    html += `</div>`;
  } else if (q.type === 'DRAG') {
    html += `<div class="drag-zone" id="dragZone-${idx}">`;
    q.blanks.forEach(b => {
      const filled = s.userAnswer && s.userAnswer[b.idx];
      html += `<div class="drag-slot ${filled ? 'filled' : ''}" data-idx="${b.idx}" ondrop="dropOnSlot(event, ${idx}, ${b.idx})" ondragover="allowDrop(event)" ondragleave="leaveSlot(event)">${filled || '拖拽到这里'}</div>`;
    });
    html += `</div>`;
    html += `<div class="drag-pool" id="dragPool-${idx}">`;
    q.pool.forEach((chip, i) => {
      const used = s.userAnswer && Object.values(s.userAnswer).includes(chip);
      html += `<div class="drag-chip ${used ? 'used' : ''}" draggable="${!used}" data-chip="${chip}" ondragstart="dragStart(event, ${idx}, '${chip}')" onclick="clickChip(${idx}, '${chip}')">${chip}</div>`;
    });
    html += `</div>`;
  }

  html += `<div class="actions">
    <button class="btn btn-primary" onclick="checkAnswer(${idx})" ${s.answered ? 'disabled' : ''}>检查答案</button>
    <button class="btn btn-secondary" onclick="resetQuestion(${idx})" ${!s.answered ? 'disabled' : ''}>重置本题</button>
  </div>`;

  if (s.answered) {
    const isCorrect = s.correct === true || (s.correct === 'partial');
    const isWrong = s.correct === false;
    html += `<div class="feedback show ${isCorrect ? 'correct' : (isWrong ? 'wrong' : '')}">`;
    html += `<div class="feedback-title">${s.correct === true ? '✅ 回答正确！' : (s.correct === 'partial' ? '⚠️ 部分正确' : '❌ 回答错误')}</div>`;
    html += `<div>${q.explanation}</div>`;
    if (q.followup && q.followup.length > 0) {
      html += `<div class="feedback-followup"><strong>面试官可能的追问：</strong><ul>`;
      q.followup.forEach(f => { html += `<li>${f}</li>`; });
      html += `</ul></div>`;
    }
    html += `<div class="feedback-source">📎 来源: ${q.src}</div>`;
    html += `</div>`;
  }

  html += `</div>`;
  container.innerHTML = html;

  document.getElementById('prevBtn').disabled = (idx === 0);
  document.getElementById('nextBtn').disabled = (idx === quizData.length - 1);
  updateProgress();
}

function selectTF(idx, val) {
  if (state[idx].answered) return;
  state[idx].userAnswer = val;
  renderQuestion(idx);
}

function selectSC(idx, val) {
  if (state[idx].answered) return;
  state[idx].userAnswer = val;
  renderQuestion(idx);
}

function selectMC(idx, val) {
  if (state[idx].answered) return;
  const s = state[idx];
  if (!s.userAnswer) s.userAnswer = [];
  const i = s.userAnswer.indexOf(val);
  if (i >= 0) s.userAnswer.splice(i, 1);
  else s.userAnswer.push(val);
  renderQuestion(idx);
}

let dragData = null;
function dragStart(e, idx, chip) {
  dragData = { idx, chip };
  e.dataTransfer.setData('text/plain', chip);
  e.dataTransfer.effectAllowed = 'move';
}
function allowDrop(e) { e.preventDefault(); e.dataTransfer.dropEffect = 'move'; e.currentTarget.classList.add('drag-over'); }
function leaveSlot(e) { e.currentTarget.classList.remove('drag-over'); }
function dropOnSlot(e, idx, slotIdx) {
  e.preventDefault();
  e.currentTarget.classList.remove('drag-over');
  if (state[idx].answered) return;
  const chip = e.dataTransfer.getData('text/plain');
  if (!chip) return;
  if (!state[idx].userAnswer) state[idx].userAnswer = {};
  // Remove chip from any other slot
  Object.keys(state[idx].userAnswer).forEach(k => {
    if (state[idx].userAnswer[k] === chip) delete state[idx].userAnswer[k];
  });
  state[idx].userAnswer[slotIdx] = chip;
  renderQuestion(idx);
}
function clickChip(idx, chip) {
  if (state[idx].answered) return;
  // Click-to-place: find first empty slot
  const q = quizData[idx];
  if (!state[idx].userAnswer) state[idx].userAnswer = {};
  // If chip already in a slot, remove it
  let alreadyIn = -1;
  Object.keys(state[idx].userAnswer).forEach(k => {
    if (state[idx].userAnswer[k] === chip) alreadyIn = parseInt(k);
  });
  if (alreadyIn >= 0) {
    delete state[idx].userAnswer[alreadyIn];
    renderQuestion(idx);
    return;
  }
  // Place in first empty slot
  for (let i = 0; i < q.blanks.length; i++) {
    if (!state[idx].userAnswer[i]) {
      state[idx].userAnswer[i] = chip;
      renderQuestion(idx);
      return;
    }
  }
}

function checkAnswer(idx) {
  const q = quizData[idx];
  const s = state[idx];
  if (s.answered) return;

  if (q.type === 'TF') {
    s.correct = (s.userAnswer === q.answer);
  } else if (q.type === 'SC') {
    s.correct = (s.userAnswer === q.answer);
  } else if (q.type === 'MC') {
    if (!s.userAnswer || s.userAnswer.length === 0) { s.correct = false; }
    else {
      const correctSet = new Set(q.answer);
      const userSet = new Set(s.userAnswer);
      const allCorrect = q.answer.every(i => userSet.has(i)) && s.userAnswer.every(i => correctSet.has(i));
      const partial = !allCorrect && q.answer.some(i => userSet.has(i));
      s.correct = allCorrect ? true : (partial ? 'partial' : false);
    }
  } else if (q.type === 'DRAG') {
    if (!s.userAnswer) { s.correct = false; }
    else {
      let allCorrect = true;
      q.blanks.forEach(b => {
        if (s.userAnswer[b.idx] !== b.expected) allCorrect = false;
      });
      s.correct = allCorrect;
    }
  }

  s.answered = true;
  renderQuestion(idx);
  updateProgress();
}

function resetQuestion(idx) {
  state[idx] = { answered: false, correct: null, userAnswer: null };
  renderQuestion(idx);
  updateProgress();
}

function resetAll() {
  if (!confirm('确定要重置所有题目的答题记录吗？')) return;
  for (let i = 0; i < state.length; i++) {
    state[i] = { answered: false, correct: null, userAnswer: null };
  }
  currentIdx = 0;
  renderQuestion(currentIdx);
  updateProgress();
}

function prevQuestion() { if (currentIdx > 0) { currentIdx--; renderQuestion(currentIdx); window.scrollTo({top: 0, behavior: 'smooth'}); } }
function nextQuestion() { if (currentIdx < quizData.length - 1) { currentIdx++; renderQuestion(currentIdx); window.scrollTo({top: 0, behavior: 'smooth'}); } }

function updateProgress() {
  const answered = state.filter(s => s.answered).length;
  const correct = state.filter(s => s.correct === true).length;
  document.getElementById('answeredCount').textContent = answered;
  document.getElementById('scoreCount').textContent = correct;
  document.getElementById('progressFill').style.width = (answered / quizData.length * 100) + '%';
}

function toggleOverview() {
  const panel = document.getElementById('overviewPanel');
  panel.classList.toggle('show');
  if (panel.classList.contains('show')) renderOverview();
}

function renderOverview(filter = 'all') {
  const grid = document.getElementById('overviewGrid');
  let html = '';
  quizData.forEach((q, i) => {
    const s = state[i];
    let cls = 'overview-item';
    let status = '⬜ 未答';
    if (s.answered) {
      cls += ' answered';
      if (s.correct === true) { cls += ' correct'; status = '✅ 正确'; }
      else if (s.correct === 'partial') { cls += ' partial'; status = '⚠️ 部分'; }
      else { cls += ' wrong'; status = '❌ 错误'; }
    }
    if (filter !== 'all') {
      if (filter === 'correct' && s.correct !== true) return;
      if (filter === 'wrong' && s.correct !== false) return;
      if (filter === 'partial' && s.correct !== 'partial') return;
      if (filter === 'unanswered' && s.answered) return;
    }
    html += `<div class="${cls}" onclick="jumpTo(${i})">
      <div class="overview-num">#${q.id}</div>
      <div style="font-size:0.78rem;color:var(--muted);margin-top:4px;">${TYPE_LABEL[q.type]}</div>
      <div class="overview-status">${status}</div>
    </div>`;
  });
  grid.innerHTML = html;
}

function filterOverview(filter) {
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  document.querySelector(`[data-filter="${filter}"]`).classList.add('active');
  renderOverview(filter);
}

function jumpTo(idx) {
  currentIdx = idx;
  renderQuestion(idx);
  document.getElementById('overviewPanel').classList.remove('show');
  window.scrollTo({top: 0, behavior: 'smooth'});
}

// Init
renderQuestion(0);
updateProgress();
</script>
