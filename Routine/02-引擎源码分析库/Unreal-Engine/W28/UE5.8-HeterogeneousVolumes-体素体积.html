let dragQuestions = JSON.parse(JSON.stringify(_origDrag));
let singleQuestions = JSON.parse(JSON.stringify(_origSingle));
let multiQuestions = JSON.parse(JSON.stringify(_origMulti));
let trueFalseQuestions = JSON.parse(JSON.stringify(_origTF));

let currentMode = 'drag';
let currentIdx = 0;
let dragState = {};
let singleState = {};
let multiState = {};
let tfState = {};
let allQuestions = [];
let currentFilter = 'all';

function rebuildAllQuestions() {
  allQuestions = [];
  dragQuestions.forEach((q, i) => allQuestions.push({ mode: 'drag', idx: i, id: q.id }));
  singleQuestions.forEach((q, i) => allQuestions.push({ mode: 'single', idx: i, id: q.id }));
  multiQuestions.forEach((q, i) => allQuestions.push({ mode: 'multi', idx: i, id: q.id }));
  trueFalseQuestions.forEach((q, i) => allQuestions.push({ mode: 'tf', idx: i, id: q.id }));
  document.getElementById('totalCount').textContent = allQuestions.length;
  document.getElementById('totalMax').textContent = allQuestions.length;
  document.getElementById('cntDrag').textContent = dragQuestions.length;
  document.getElementById('cntSingle').textContent = singleQuestions.length;
  document.getElementById('cntMulti').textContent = multiQuestions.length;
  document.getElementById('cntTF').textContent = trueFalseQuestions.length;
}

function shuffleArray(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function shuffleOptions(q) {
  const indices = q.options.map((_, i) => i);
  const shuffledIndices = shuffleArray(indices);
  const newOptions = shuffledIndices.map(i => q.options[i]);
  const newOptionExplanations = shuffledIndices.map(i => q.optionExplanations[i]);
  const newCorrect = Array.isArray(q.correct)
    ? q.correct.map(oldIdx => shuffledIndices.indexOf(oldIdx)).filter(i => i >= 0).sort((a, b) => a - b)
    : shuffledIndices.indexOf(q.correct);
  return { ...q, options: newOptions, optionExplanations: newOptionExplanations, correct: newCorrect };
}

function reshuffleAll() {
  if (!confirm('确定要随机打乱所有题目和选项吗?分数会清空。')) return;
  resetAll();
  dragQuestions = shuffleArray(JSON.parse(JSON.stringify(_origDrag)));
  singleQuestions = shuffleArray(JSON.parse(JSON.stringify(_origSingle))).map(shuffleOptions);
  multiQuestions = shuffleArray(JSON.parse(JSON.stringify(_origMulti))).map(shuffleOptions);
  trueFalseQuestions = shuffleArray(JSON.parse(JSON.stringify(_origTF)));
  rebuildAllQuestions();
  switchMode(currentMode);
}

function resetAll() {
  dragState = {}; singleState = {}; multiState = {}; tfState = {};
  rebuildAllQuestions();
  switchMode(currentMode);
  updateScore();
}

function getState(mode, idx) {
  if (mode === 'drag') return dragState[idx] || (dragState[idx] = { filled: [], checked: false, correct: null });
  if (mode === 'single') return singleState[idx] || (singleState[idx] = { selected: -1, checked: false, correct: null });
  if (mode === 'multi') return multiState[idx] || (multiState[idx] = { selected: [], checked: false, correct: null });
  if (mode === 'tf') return tfState[idx] || (tfState[idx] = { selected: null, checked: false, correct: null });
}

function switchMode(mode) {
  currentMode = mode;
  currentIdx = 0;
  document.querySelectorAll('.nav-tab').forEach(t => {
    t.classList.toggle('active', t.dataset.mode === mode);
  });
  if (mode === 'drag') renderDrag();
  else if (mode === 'single') renderSingle();
  else if (mode === 'multi') renderMulti();
  else if (mode === 'tf') renderTrueFalse();
}

function getCurrentList() {
  if (currentMode === 'drag') return dragQuestions;
  if (currentMode === 'single') return singleQuestions;
  if (currentMode === 'multi') return multiQuestions;
  if (currentMode === 'tf') return trueFalseQuestions;
  return [];
}

function prevCard() {
  if (currentIdx > 0) { currentIdx--; renderCurrent(); }
}

function nextCard() {
  const list = getCurrentList();
  if (currentIdx < list.length - 1) { currentIdx++; renderCurrent(); }
}

function renderCurrent() {
  if (currentMode === 'drag') renderDrag();
  else if (currentMode === 'single') renderSingle();
  else if (currentMode === 'multi') renderMulti();
  else if (currentMode === 'tf') renderTrueFalse();
}

function updateScore() {
  let correct = 0, wrong = 0, unanswered = 0;
  dragQuestions.forEach((_, i) => {
    const s = dragState[i];
    if (!s || s.filled.length === 0) unanswered++;
    else if (s.correct === true) correct++;
    else if (s.correct === false) wrong++;
  });
  singleQuestions.forEach((_, i) => {
    const s = singleState[i];
    if (!s || s.selected === -1) unanswered++;
    else if (s.correct === true) correct++;
    else if (s.correct === false) wrong++;
  });
  multiQuestions.forEach((_, i) => {
    const s = multiState[i];
    if (!s || s.selected.length === 0) unanswered++;
    else if (s.correct === true) correct++;
    else if (s.correct === false) wrong++;
  });
  trueFalseQuestions.forEach((_, i) => {
    const s = tfState[i];
    if (!s || s.selected === null) unanswered++;
    else if (s.correct === true) correct++;
    else if (s.correct === false) wrong++;
  });
  document.getElementById('totalScore').textContent = correct;
  document.getElementById('correctCount').textContent = correct;
  document.getElementById('wrongCount').textContent = wrong;
  document.getElementById('unansweredCount').textContent = unanswered;
  const list = getCurrentList();
  document.getElementById('currentIdx').textContent = Math.min(currentIdx + 1, list.length);
  document.getElementById('progressFill').style.width = (list.length > 0 ? ((currentIdx + 1) / list.length * 100) : 0) + '%';
}

function escapeHtml(s) {
  return String(s).replace(/[&<>"']/g, c => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' })[c]);
}

// ====================== Drag ======================

function renderDrag() {
  const list = dragQuestions;
  if (list.length === 0) { document.getElementById('cardContainer').innerHTML = ''; updateScore(); return; }
  if (currentIdx >= list.length) currentIdx = list.length - 1;
  if (currentIdx < 0) currentIdx = 0;
  const q = list[currentIdx];
  const s = getState('drag', currentIdx);
  const dropCount = (q.sentence.match(/\[\d+\]/g) || []).length;
  while (s.filled.length < dropCount) s.filled.push(null);

  let html = `<div class="card"><span class="card-number">${currentIdx + 1}</span><h3>${escapeHtml(q.sentence.replace(/\[\d+\]/g, m => {
    const idx = parseInt(m.slice(1, -1));
    const filled = s.filled[idx];
    const cls = !filled ? '' : (s.checked ? (s.correct ? 'correct' : 'wrong') : 'filled');
    const text = filled ? `<span class="dropped-text">${escapeHtml(filled)}</span>` : '拖入';
    return `</h3></div><div class="card"><span class="card-number"></span><h3><span class="drop-zone ${cls}" data-slot="${idx}">${text}</span>`;
  }))}<span class="q-type">拖拽填空</span></h3>`;

  html += `<div class="drag-pool">`;
  q.pool.forEach((term, i) => {
    const used = s.filled.includes(term);
    html += `<div class="draggable ${used ? 'used' : ''}" draggable="${!used}" data-term="${escapeHtml(term)}">${escapeHtml(term)}</div>`;
  });
  html += `</div>`;

  if (s.checked) {
    const cls = s.correct ? 'feedback-correct' : 'feedback-wrong';
    const title = s.correct ? '✅ 回答正确!' : '❌ 回答错误';
    html += `<div class="feedback show ${cls}"><span class="feedback-title">${title}</span><ul>`;
    q.answers.forEach((ans, i) => {
      const got = s.filled[i] || '(空)';
      const ok = s.filled[i] === ans;
      html += `<li>第 ${i + 1} 空:正确答案 <b>${escapeHtml(ans)}</b>${ok ? ' ✓' : ` (你答: ${escapeHtml(got)})`}<br><span style="opacity:.8">${escapeHtml(q.perSlot[i] || '')}</span></li>`;
    });
    html += `</ul></div>`;
  }

  html += `<div class="action-row">
    <button class="btn btn-primary" onclick="checkDrag()">检查答案</button>
    <button class="btn" onclick="resetDrag()">重置</button>
  </div></div>`;

  document.getElementById('cardContainer').innerHTML = html;
  attachDragHandlers();
  updateScore();
}

function attachDragHandlers() {
  const draggables = document.querySelectorAll('.draggable:not(.used)');
  const dropZones = document.querySelectorAll('.drop-zone');
  draggables.forEach(d => {
    d.addEventListener('dragstart', e => { e.dataTransfer.setData('text/plain', d.dataset.term); e.dataTransfer.effectAllowed = 'move'; });
  });
  dropZones.forEach(z => {
    z.addEventListener('dragover', e => { e.preventDefault(); z.classList.add('drag-over'); });
    z.addEventListener('dragleave', () => z.classList.remove('drag-over'));
    z.addEventListener('drop', e => {
      e.preventDefault();
      z.classList.remove('drag-over');
      const term = e.dataTransfer.getData('text/plain');
      const slot = parseInt(z.dataset.slot);
      const s = getState('drag', currentIdx);
      const prev = s.filled[slot];
      s.filled[slot] = term;
      if (prev === term) return;
      renderDrag();
    });
  });
  dropZones.forEach(z => {
    if (z.classList.contains('filled')) {
      z.addEventListener('click', () => {
        const slot = parseInt(z.dataset.slot);
        const s = getState('drag', currentIdx);
        s.filled[slot] = null;
        renderDrag();
      });
    }
  });
}

function checkDrag() {
  const q = dragQuestions[currentIdx];
  const s = getState('drag', currentIdx);
  const allFilled = s.filled.every(f => f !== null && f !== undefined);
  if (!allFilled) { alert('请先填完所有空'); return; }
  let correct = true;
  for (let i = 0; i < q.answers.length; i++) if (s.filled[i] !== q.answers[i]) { correct = false; break; }
  s.checked = true;
  s.correct = correct;
  renderDrag();
}

function resetDrag() {
  delete dragState[currentIdx];
  renderDrag();
}

// ====================== Single ======================

function renderSingle() {
  const list = singleQuestions;
  if (list.length === 0) { document.getElementById('cardContainer').innerHTML = ''; updateScore(); return; }
  if (currentIdx >= list.length) currentIdx = list.length - 1;
  const q = list[currentIdx];
  const s = getState('single', currentIdx);

  let html = `<div class="card"><span class="card-number">${currentIdx + 1}</span><h3>${escapeHtml(q.q)}<span class="q-type">单选</span></h3><div class="options-list">`;
  q.options.forEach((opt, i) => {
    let cls = '';
    if (s.checked) {
      if (i === q.correct) cls = 'correct-mark';
      else if (i === s.selected && i !== q.correct) cls = 'wrong-mark';
    } else if (i === s.selected) cls = 'selected';
    html += `<div class="option ${cls}" onclick="selectSingle(${i})"><span class="opt-marker">${String.fromCharCode(65 + i)}</span><span>${escapeHtml(opt)}</span></div>`;
  });
  html += `</div>`;
  if (s.checked) {
    const cls = s.correct ? 'feedback-correct' : 'feedback-wrong';
    const title = s.correct ? '✅ 回答正确!' : '❌ 回答错误';
    html += `<div class="feedback show ${cls}"><span class="feedback-title">${title}</span><ul>`;
    q.optionExplanations.forEach((e, i) => { html += `<li>${escapeHtml(e)}</li>`; });
    html += `</ul></div>`;
  }
  html += `<div class="action-row">
    <button class="btn btn-primary" onclick="checkSingle()">检查答案</button>
    <button class="btn" onclick="resetSingle()">重置</button>
  </div></div>`;
  document.getElementById('cardContainer').innerHTML = html;
  updateScore();
}

function selectSingle(i) {
  const s = getState('single', currentIdx);
  if (s.checked) return;
  s.selected = i;
  renderSingle();
}

function checkSingle() {
  const q = singleQuestions[currentIdx];
  const s = getState('single', currentIdx);
  if (s.selected === -1) { alert('请先选择'); return; }
  s.checked = true;
  s.correct = (s.selected === q.correct);
  renderSingle();
}

function resetSingle() {
  delete singleState[currentIdx];
  renderSingle();
}

// ====================== Multi ======================

function renderMulti() {
  const list = multiQuestions;
  if (list.length === 0) { document.getElementById('cardContainer').innerHTML = ''; updateScore(); return; }
  if (currentIdx >= list.length) currentIdx = list.length - 1;
  const q = list[currentIdx];
  const s = getState('multi', currentIdx);

  let html = `<div class="card"><span class="card-number">${currentIdx + 1}</span><h3>${escapeHtml(q.q)}<span class="q-type">多选</span></h3><div class="options-list">`;
  q.options.forEach((opt, i) => {
    let cls = '';
    const isSelected = s.selected.includes(i);
    const isCorrect = q.correct.includes(i);
    if (s.checked) {
      if (isCorrect) cls = 'correct-mark';
      else if (isSelected && !isCorrect) cls = 'wrong-mark';
    } else if (isSelected) cls = 'selected';
    html += `<div class="option ${cls}" onclick="toggleMulti(${i})"><span class="opt-marker">${isSelected ? '✓' : String.fromCharCode(65 + i)}</span><span>${escapeHtml(opt)}</span></div>`;
  });
  html += `</div>`;
  if (s.checked) {
    const cls = s.correct ? 'feedback-correct' : 'feedback-wrong';
    const title = s.correct ? '✅ 全部正确!' : '❌ 有错误';
    html += `<div class="feedback show ${cls}"><span class="feedback-title">${title}</span><ul>`;
    q.optionExplanations.forEach((e, i) => { html += `<li>${escapeHtml(e)}</li>`; });
    html += `</ul></div>`;
  }
  html += `<div class="action-row">
    <button class="btn btn-primary" onclick="checkMulti()">检查答案</button>
    <button class="btn" onclick="resetMulti()">重置</button>
  </div></div>`;
  document.getElementById('cardContainer').innerHTML = html;
  updateScore();
}

function toggleMulti(i) {
  const s = getState('multi', currentIdx);
  if (s.checked) return;
  const idx = s.selected.indexOf(i);
  if (idx >= 0) s.selected.splice(idx, 1);
  else s.selected.push(i);
  s.selected.sort((a, b) => a - b);
  renderMulti();
}

function checkMulti() {
  const q = multiQuestions[currentIdx];
  const s = getState('multi', currentIdx);
  if (s.selected.length === 0) { alert('请至少选择一项'); return; }
  const set1 = new Set(s.selected);
  const set2 = new Set(q.correct);
  s.checked = true;
  s.correct = set1.size === set2.size && [...set1].every(x => set2.has(x));
  renderMulti();
}

function resetMulti() {
  delete multiState[currentIdx];
  renderMulti();
}

// ====================== True/False ======================

function renderTrueFalse() {
  const list = trueFalseQuestions;
  if (list.length === 0) { document.getElementById('cardContainer').innerHTML = ''; updateScore(); return; }
  if (currentIdx >= list.length) currentIdx = list.length - 1;
  const q = list[currentIdx];
  const s = getState('tf', currentIdx);

  let html = `<div class="card"><span class="card-number">${currentIdx + 1}</span><h3>${escapeHtml(q.q)}<span class="q-type">判断</span></h3><div class="tf-options">`;
  const opts = [{ v: true, l: '✓ 正确 (True)' }, { v: false, l: '✗ 错误 (False)' }];
  opts.forEach(o => {
    let cls = '';
    if (s.checked) {
      if (o.v === q.correct) cls = 'correct-mark';
      else if (s.selected === o.v && o.v !== q.correct) cls = 'wrong-mark';
    } else if (s.selected === o.v) cls = 'selected';
    html += `<div class="tf-btn ${cls}" onclick="selectTF(${o.v})">${o.l}</div>`;
  });
  html += `</div>`;
  if (s.checked) {
    const cls = s.correct ? 'feedback-correct' : 'feedback-wrong';
    const title = s.correct ? '✅ 判断正确!' : '❌ 判断错误';
    html += `<div class="feedback show ${cls}"><span class="feedback-title">${title}</span><div>${escapeHtml(q.explanation)}</div></div>`;
  }
  html += `<div class="action-row">
    <button class="btn btn-primary" onclick="checkTF()">检查答案</button>
    <button class="btn" onclick="resetTF()">重置</button>
  </div></div>`;
  document.getElementById('cardContainer').innerHTML = html;
  updateScore();
}

function selectTF(v) {
  const s = getState('tf', currentIdx);
  if (s.checked) return;
  s.selected = v;
  renderTrueFalse();
}

function checkTF() {
  const q = trueFalseQuestions[currentIdx];
  const s = getState('tf', currentIdx);
  if (s.selected === null) { alert('请先判断'); return; }
  s.checked = true;
  s.correct = (s.selected === q.correct);
  renderTrueFalse();
}

function resetTF() {
  delete tfState[currentIdx];
  renderTrueFalse();
}

// ====================== Overview ======================

function toggleOverview() {
  const p = document.getElementById('overviewPanel');
  p.classList.toggle('show');
  if (p.classList.contains('show')) renderOverview();
}

function setFilter(f) {
  currentFilter = f;
  document.querySelectorAll('.filter-btn').forEach(b => {
    b.classList.toggle('active', b.dataset.filter === f);
  });
  renderOverview();
}

function renderOverview() {
  const grid = document.getElementById('overviewGrid');
  let html = '';
  allQuestions.forEach((q, i) => {
    const state = q.mode === 'drag' ? dragState[q.idx] : q.mode === 'single' ? singleState[q.idx] : q.mode === 'multi' ? multiState[q.idx] : tfState[q.idx];
    let cls = '';
    if (state && state.checked) cls = state.correct ? 'correct' : 'wrong';
    else if (state && ((state.filled && state.filled.length > 0 && state.filled.some(f => f)) || (state.selected !== undefined && state.selected !== null && state.selected !== -1) || (state.selected && state.selected.length > 0))) cls = '';
    let show = true;
    if (currentFilter === 'correct') show = cls === 'correct';
    else if (currentFilter === 'wrong') show = cls === 'wrong';
    else if (currentFilter === 'unanswered') show = !cls;
    if (!show) return;
    const modeLabel = { drag: '填', single: '单', multi: '多', tf: '判' }[q.mode];
    html += `<div class="overview-item ${cls}" onclick="jumpTo('${q.mode}', ${q.idx})"><div class="ov-num">${i + 1}</div><div class="ov-type">${modeLabel}</div></div>`;
  });
  grid.innerHTML = html;
}

function jumpTo(mode, idx) {
  currentIdx = idx;
  switchMode(mode);
  toggleOverview();
}

// ====================== Init ======================

rebuildAllQuestions();
switchMode('drag');
</script>
