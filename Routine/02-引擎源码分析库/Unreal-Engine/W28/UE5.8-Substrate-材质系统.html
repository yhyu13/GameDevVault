<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>UE5.8 Substrate 材质系统 · 互动式面试卡牌</title>
<style>
:root{--bg:#1a1a2e;--card-bg:#262647;--primary:#b388ff;--primary-dim:#7c4dff;--accent:#b388ff;--accent-wrong:#ff6b9d;--text:#e0e0e0;--text-light:#9a9ab0;--border:#3d3d6b;--shadow:rgba(0,0,0,.4);--drop-zone:#2d2d52;--draggable:#34345e;--status-correct:#1f3d2d;--status-wrong:#3d1f2d;--status-unanswered:#2d2d52}
*{box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Microsoft YaHei",sans-serif;background:var(--bg);color:var(--text);margin:0;padding:0;min-height:100vh}
header{background:linear-gradient(135deg,#2d1b4e,#1a1a2e);color:#fff;padding:1.2rem 1.5rem;box-shadow:0 2px 12px var(--shadow);display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:.8rem;border-bottom:1px solid var(--primary-dim)}
header h1{margin:0;font-size:1.3rem;font-weight:500;color:#fff}
header p{margin:.2rem 0 0;opacity:.85;font-size:.85rem}
.header-left{flex:1;min-width:260px}
.header-actions{display:flex;gap:.5rem;flex-wrap:wrap}
.header-btn{padding:.5rem 1rem;background:rgba(179,136,255,.15);border:1px solid rgba(179,136,255,.4);border-radius:8px;color:#fff;cursor:pointer;transition:all .2s;font-size:.88rem;text-decoration:none;display:inline-block}
.header-btn:hover{background:rgba(179,136,255,.3);border-color:var(--primary)}
.container{max-width:820px;margin:0 auto;padding:1.5rem}
.nav-tabs{display:flex;gap:.4rem;margin-bottom:1.0rem;flex-wrap:wrap}
.nav-tab{flex:1;min-width:90px;padding:.6rem .6rem;border:1px solid var(--border);border-radius:8px;background:var(--card-bg);cursor:pointer;text-align:center;font-size:.85rem;transition:all .2s;color:var(--text-light)}
.nav-tab.active{background:var(--primary);color:#1a1a2e;border-color:var(--primary);box-shadow:0 2px 8px rgba(179,136,255,.4);font-weight:600}
.nav-tab:hover:not(.active){background:#34345e;color:var(--text)}
.score-bar{display:flex;align-items:center;gap:1rem;margin-bottom:.6rem;flex-wrap:wrap;padding:.7rem 1rem;background:var(--card-bg);border-radius:8px;border:1px solid var(--border)}
.score-mini{font-size:.85rem;color:var(--text-light);white-space:nowrap}
.score-mini .score-num{color:var(--primary);font-weight:700;font-size:1.05rem}
.progress-text{text-align:right;font-size:.8rem;color:var(--text-light);margin-bottom:.3rem}
.progress-bar{height:6px;background:#0f0f1f;border-radius:3px;overflow:hidden;margin-bottom:1.2rem}
.progress-fill{height:100%;background:linear-gradient(90deg,#b388ff,#7c4dff);border-radius:3px;transition:width .3s ease}
.card{background:var(--card-bg);border-radius:12px;padding:1.6rem 1.8rem;box-shadow:0 4px 16px var(--shadow);margin-bottom:1.2rem;border:1px solid var(--border)}
.card-number{display:inline-block;width:26px;height:26px;background:var(--primary);color:#1a1a2e;border-radius:50%;text-align:center;line-height:26px;font-size:.8rem;font-weight:700;margin-right:.5rem}
.card h3{margin:0 0 1.0rem;font-size:1.05rem;font-weight:500;line-height:1.5;color:var(--text)}
.q-type{font-size:.75rem;color:var(--primary);background:rgba(179,136,255,.15);padding:2px 8px;border-radius:4px;margin-left:.4rem;border:1px solid rgba(179,136,255,.3)}
.drag-sentence{font-size:1.0rem;line-height:2.4;margin-bottom:1.2rem;color:var(--text)}
.drop-zone{display:inline-block;min-width:90px;height:32px;line-height:30px;border:2px dashed var(--border);border-radius:6px;background:var(--drop-zone);text-align:center;vertical-align:middle;margin:0 3px;transition:all .2s;padding:0 6px;font-size:.95rem;color:var(--text-light)}
.drop-zone.drag-over{background:#3d3d6b;border-color:var(--primary)}
.drop-zone.filled{border-style:solid;border-color:var(--primary);background:#34345e;cursor:pointer;color:#fff}
.drop-zone.correct{border-color:#4caf50;background:var(--status-correct);color:#4caf50}
.drop-zone.wrong{border-color:var(--accent-wrong);background:var(--status-wrong);color:var(--accent-wrong)}
.drop-zone .dropped-text{font-weight:500;color:var(--primary)}
.drop-zone.correct .dropped-text{color:#4caf50}
.drop-zone.wrong .dropped-text{color:var(--accent-wrong)}
.drag-pool{margin:1.2rem 0;display:flex;flex-wrap:wrap;gap:.5rem;padding:.8rem;background:var(--drop-zone);border-radius:8px;border:1px solid var(--border)}
.draggable{padding:.4rem .9rem;background:var(--draggable);border:1px solid var(--border);border-radius:6px;cursor:grab;user-select:none;transition:all .15s;font-size:.92rem;color:var(--text)}
.draggable:hover{background:#3d3d6b;border-color:var(--primary);transform:translateY(-1px)}
.draggable.used{opacity:.35;cursor:default;pointer-events:none}
.options-list{display:flex;flex-direction:column;gap:.5rem;margin-bottom:1.0rem}
.option{padding:.7rem 1.0rem;background:#1f1f3d;border:1.5px solid var(--border);border-radius:8px;cursor:pointer;transition:all .15s;display:flex;align-items:center;gap:.6rem;font-size:.95rem;line-height:1.45;color:var(--text)}
.option:hover{border-color:var(--primary);background:#2d2d52}
.option.selected{border-color:var(--primary);background:rgba(179,136,255,.15)}
.option.correct-mark{border-color:#4caf50;background:var(--status-correct);color:#4caf50}
.option.wrong-mark{border-color:var(--accent-wrong);background:var(--status-wrong);color:var(--accent-wrong)}
.option .opt-marker{width:22px;height:22px;border:1.5px solid var(--border);border-radius:50%;display:inline-flex;align-items:center;justify-content:center;font-size:.78rem;font-weight:600;flex-shrink:0;background:#1a1a2e;color:var(--text-light)}
.option.selected .opt-marker{background:var(--primary);color:#1a1a2e;border-color:var(--primary)}
.option.correct-mark .opt-marker{background:#4caf50;color:#fff;border-color:#4caf50}
.option.wrong-mark .opt-marker{background:var(--accent-wrong);color:#fff;border-color:var(--accent-wrong)}
.tf-options{display:grid;grid-template-columns:1fr 1fr;gap:.8rem;margin-bottom:1.0rem}
.tf-btn{padding:.9rem;border:1.5px solid var(--border);border-radius:8px;background:#1f1f3d;cursor:pointer;transition:all .15s;font-size:.95rem;text-align:center;color:var(--text)}
.tf-btn:hover{border-color:var(--primary);background:#2d2d52}
.tf-btn.selected{border-color:var(--primary);background:rgba(179,136,255,.15)}
.tf-btn.correct-mark{border-color:#4caf50;background:var(--status-correct);color:#4caf50}
.tf-btn.wrong-mark{border-color:var(--accent-wrong);background:var(--status-wrong);color:var(--accent-wrong)}
.feedback{margin-top:1.0rem;padding:.9rem 1.1rem;border-radius:8px;background:#1f1f3d;border-left:3px solid var(--primary);font-size:.92rem;line-height:1.6;display:none;color:var(--text)}
.feedback.show{display:block}
.feedback.feedback-correct{border-left-color:#4caf50;background:var(--status-correct)}
.feedback.feedback-wrong{border-left-color:var(--accent-wrong);background:var(--status-wrong)}
.feedback-title{font-weight:600;margin-bottom:.3rem;display:block}
.feedback ul{margin:.4rem 0 0 0;padding-left:1.2rem}
.feedback li{margin-bottom:.3rem}
.action-row{display:flex;gap:.6rem;flex-wrap:wrap;margin-top:1.0rem}
.btn{padding:.55rem 1.2rem;border-radius:8px;border:1px solid var(--border);background:var(--card-bg);color:var(--text);cursor:pointer;font-size:.9rem;transition:all .15s}
.btn:hover{background:#3d3d6b;border-color:var(--primary)}
.btn-primary{background:var(--primary);color:#1a1a2e;border-color:var(--primary);font-weight:600}
.btn-primary:hover{background:#9d6fff;border-color:#9d6fff;color:#1a1a2e}
.btn-accent{background:var(--accent);color:#1a1a2e;border-color:var(--accent)}
.btn-accent:hover{filter:brightness(.95)}
.nav-row{display:flex;justify-content:space-between;margin-top:.8rem;gap:.6rem}
.overview-panel{display:none;background:var(--card-bg);border-radius:12px;padding:1.6rem 1.8rem;box-shadow:0 4px 16px var(--shadow);margin-bottom:1.2rem;border:1px solid var(--border)}
.overview-panel.show{display:block}
.overview-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:1.0rem;flex-wrap:wrap;gap:.5rem}
.overview-header h2{margin:0;font-size:1.15rem;font-weight:500;color:var(--text)}
.overview-stats{display:flex;gap:.5rem;flex-wrap:wrap}
.filter-btn{padding:.4rem .8rem;background:var(--drop-zone);border:1px solid var(--border);border-radius:6px;cursor:pointer;font-size:.82rem;transition:all .15s;color:var(--text-light)}
.filter-btn.active{background:var(--primary);color:#1a1a2e;border-color:var(--primary);font-weight:600}
.filter-btn:hover:not(.active){background:#3d3d6b;color:var(--text)}
.overview-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(80px,1fr));gap:.5rem}
.overview-item{aspect-ratio:1;border-radius:8px;background:var(--status-unanswered);border:2px solid var(--border);display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;transition:all .15s;font-size:.78rem;text-align:center;padding:.2rem;color:var(--text-light)}
.overview-item.correct{background:var(--status-correct);border-color:#4caf50;color:#4caf50}
.overview-item.wrong{background:var(--status-wrong);border-color:var(--accent-wrong);color:var(--accent-wrong)}
.overview-item:hover{transform:scale(1.04);box-shadow:0 2px 8px var(--shadow)}
.overview-item .ov-num{font-weight:700;font-size:1.0rem;margin-bottom:.1rem}
.overview-item .ov-type{font-size:.65rem;opacity:.75;text-transform:uppercase;letter-spacing:.5px}
.hidden{display:none}
@media (max-width:600px){.container{padding:1rem}.card{padding:1.2rem 1.0rem}header{padding:1rem}header h1{font-size:1.1rem}.nav-tab{font-size:.78rem;padding:.5rem .3rem}}
</style>
</head>
<body>

<header>
  <div class="header-left">
    <h1>UE5.8 Substrate 材质系统 · 互动式面试卡牌</h1>
    <p>UE 5.8 · 共 30 题（拖拽 6 + 单选 9 + 多选 7 + 判断 8）· <a class="header-btn" href="UE5.8-Substrate-材质系统.md" target="_blank">📄 配套源码笔记</a></p>

<div class="container">

  <div class="nav-tabs">
    <div class="nav-tab active" data-type="all">全部</div>

  <div id="questions-container"></div>

</div>

<script>
const _origDrag = [
  {
    text: "Substrate 把像素分成 4 种 tile:Simple / <span class='drop-zone' data-idx='0'></span> / Complex / <span class='drop-zone' data-idx='1'></span>。StencilBit_Complex = <span class='drop-zone' data-idx='2'></span>(十六进制)。",
    answers: ["Single", "ComplexSpecial", "0x40"],
    pool: ["Single", "ComplexSpecial", "0x40", "Fast", "0x10", "0x20", "0x80", "OpaqueRough"],
    explanations: [
      "✅ Single tile: 单 closure 走 fast path(对应 StencilBit_Single=0x20)",
      "✅ ComplexSpecial tile: 多层 closure + 完整 BSDF 评估(对应 StencilBit_ComplexSpecial=0x80)",
      "✅ StencilBit_Complex = 0x40(Substrate.h:212),用 trailing bits 避免污染 shadow mask"
    ]
  },
  {
    text: "材质分类主入口是 Substrate::<span class='drop-zone' data-idx='0'></span>(Substrate.cpp:1701),Rough Refraction 入口是 Substrate::<span class='drop-zone' data-idx='1'></span>(SubstrateRoughRefraction.cpp:79)。",
    answers: ["AddSubstrateMaterialClassificationPass", "AddSubstrateOpaqueRoughRefractionPasses"],
    pool: ["AddSubstrateMaterialClassificationPass", "AddSubstrateOpaqueRoughRefractionPasses", "AddSubstrateStencilPass", "BindSubstrateGlobalUniformParameters", "InitialiseSubstrateFrameSceneData"],
    explanations: [
      "✅ AddSubstrateMaterialClassificationPass 是 tile 分类入口(读 TopLayerTexture → 写 ClassificationTileListBuffer)",
      "✅ AddSubstrateOpaqueRoughRefractionPasses 是 basepass 期间独立 tile 的折射合成,3 个 PSO:H→V→SSS"
    ]
  },
  {
    text: "Substrate 用 <span class='drop-zone' data-idx='0'></span> 描述材质(替代 legacy GBuffer 8 槽位),所有 closure 数据打包到 <span class='drop-zone' data-idx='1'></span>。StencilBit 4 个值是 0x10/0x20/0x40/<span class='drop-zone' data-idx='2'></span>。",
    answers: ["closure 图", "MaterialTextureArray", "0x80"],
    pool: ["closure 图", "MaterialTextureArray", "0x80", "TopLayerTexture", "GBufferA", "0x08", "1 个"],
    explanations: [
      "✅ Closure 图:任意深度的材质树,支持无限层(对比 legacy GBuffer 8 层硬上限)",
      "✅ MaterialTextureArray:Texture2DArray<uint>,每像素所有 closure 数据打包成 uint32 数组",
      "✅ StencilBit_ComplexSpecial = 0x80(Substrate.h:214),对应最复杂 tile"
    ]
  },
  {
    text: "FSubstrateCommonParameters 包含 6 个字段:MaxBytesPerPixel / MaxClosurePerPixel / bRoughDiffuse / PeelLayersAboveDepth / <span class='drop-zone' data-idx='0'></span> / <span class='drop-zone' data-idx='1'></span>。其中 <span class='drop-zone' data-idx='2'></span> 决定 light sample 的随机性。",
    answers: ["bRoughnessTracking", "bStochasticLighting", "bStochasticLighting"],
    pool: ["bRoughnessTracking", "bStochasticLighting", "bIsMobile", "bIsReflection", "TileCount", "MaxBytesPerFragment"],
    explanations: [
      "✅ bRoughnessTracking:上层 roughness 影响下层(模拟散射),r.Substrate.Debug.RoughnessTracking 控制",
      "✅ bStochasticLighting:随机 light sampling 减少 light count(r.Substrate.StochasticLighting.Active)",
      "✅ bStochasticLighting 决定 light sample 的随机性,默认 0,启用可大幅减少 light count"
    ]
  },
  {
    text: "FSubstrateSceneData 拆分 <span class='drop-zone' data-idx='0'></span>(跨帧单调递增,避免 realloc)和 <span class='drop-zone' data-idx='1'></span>(当前帧实际需求)。默认用 AllocationMode=<span class='drop-zone' data-idx='2'></span> 决定 slice 数。",
    answers: ["PersistentMaxBytesPerPixel", "EffectiveMaxBytesPerPixel", "1"],
    pool: ["PersistentMaxBytesPerPixel", "EffectiveMaxBytesPerPixel", "1", "0", "2", "MaxBytesPerPixel", "MaxClosurePerPixel"],
    explanations: [
      "✅ PersistentMaxBytesPerPixel:跨帧历史最大值,跨帧单调递增,避免回退场景时 realloc",
      "✅ EffectiveMaxBytesPerPixel:当前帧实际需求,初始为 ViewsMaxBytesPerPixel",
      "✅ AllocationMode=1 (默认):max(views, persistent),只增不减,避免 GPU 资源抖动"
    ]
  },
  {
    text: "Substrate 默认 MaterialTextureArray 格式是 <span class='drop-zone' data-idx='0'></span>,每像素所有 closure 数据打包成 <span class='drop-zone' data-idx='1'></span>。TopLayerTexture 存的是 <span class='drop-zone' data-idx='2'></span>。",
    answers: ["Texture2DArray<uint>", "uint32 packed", "顶层 BSDF 参数(normal/roughness/baseColor)"],
    pool: ["Texture2DArray<uint>", "uint32 packed", "顶层 BSDF 参数(normal/roughness/baseColor)", "Texture2D<float4>", "half packed", "GBufferA 的值"],
    explanations: [
      "✅ MaterialTextureArray 是 Texture2DArray<uint>,每个 texel = uint32 packed data",
      "✅ 所有 closure 数据打包成 uint32(节省带宽、texture 采样简单)",
      "✅ TopLayerTexture 存顶层材质的 BSDF:normal / roughness / baseColor / F0"
    ]
  }
];

const _origSingle = [
  {
    q: "Substrate 取代的是哪个老的材质系统?",
    options: [
      "Legacy GBuffer slot model + Strata-pre",
      "Forward+ 渲染管线",
      "MegaLights / Lumen 直接光照",
      "BentNormal AO 方案"
    ],
    correct: 0,
    explanations: [
      "✅ Substrate 取代 legacy GBuffer 8 槽位 + Strata-pre,把材质建模换成 closure 图",
      "❌ Forward+ 跟 Substrate 是独立维度(forward vs deferred)",
      "❌ MegaLights 是独立 light sampling 优化,Substrate 不取代它",
      "❌ BentNormal AO 是 SSAO 升级,跟材质系统无关"
    ]
  },
  {
    q: "StencilBit_Complex 的十六进制值是?",
    options: ["0x10", "0x20", "0x40", "0x80"],
    correct: 2,
    explanations: [
      "❌ 0x10 是 StencilBit_Fast(Simple tile)",
      "❌ 0x20 是 StencilBit_Single(Single tile)",
      "✅ StencilBit_Complex = 0x40(Substrate.h:212)",
      "❌ 0x80 是 StencilBit_ComplexSpecial(最复杂 tile)"
    ]
  },
  {
    q: "FSubstrateGlobalUniformParameters 用 RENDERER_API 标记的原因是?",
    options: [
      "强制 shader compiler 走 RENDERER_API 路径",
      "Workaround other modules doing 'private include' of the Renderer module",
      "让 Mesh Pass Processor 直接访问",
      "对齐 shader 版本号"
    ],
    correct: 1,
    explanations: [
      "❌ RENDERER_API 跟 shader compiler 无关",
      "✅ Substrate.h:60-62 注释明确:workaround other modules doing 'private include' of the Renderer module,让外部模块能直接访问这个 UB",
      "❌ Mesh Pass Processor 访问不需要 RENDERER_API",
      "❌ 跟 shader 版本无关"
    ]
  },
  {
    q: "AddSubstrateMaterialClassificationPass 位于源文件哪行?",
    options: ["Substrate.cpp:460", "Substrate.cpp:900", "Substrate.cpp:1497", "Substrate.cpp:1701"],
    correct: 3,
    explanations: [
      "❌ :460 是 InitialiseSubstrateFrameSceneData",
      "❌ :900 是 BindSubstrateGlobalUniformParameters",
      "❌ :1497 是 AddSubstrateStencilPass",
      "✅ AddSubstrateMaterialClassificationPass 在 Substrate.cpp:1701"
    ]
  },
  {
    q: "FSubstrateCommonParameters 包含多少个字段?",
    options: ["4 个", "6 个", "10 个", "14 个"],
    correct: 1,
    explanations: [
      "❌ 太少(漏了 roughness tracking / stochastic lighting)",
      "✅ 6 个:MaxBytesPerPixel / MaxClosurePerPixel / bRoughDiffuse / PeelLayersAboveDepth / bRoughnessTracking / bStochasticLighting",
      "❌ 10 个是 FSubstrateGlobalUniformParameters 之外其他 Substrate UB 的子集",
      "❌ 14+ 个是 FSubstrateGlobalUniformParameters 全字段数"
    ]
  },
  {
    q: "Opaque Rough Refraction 的入口函数在哪?",
    options: [
      "Substrate.cpp:1497 (AddSubstrateStencilPass)",
      "SubstrateRoughRefraction.cpp:79",
      "Substrate.cpp:2027 (AddSubstrateSampleMaterialPass)",
      "SubstrateVisualize.cpp"
    ],
    correct: 1,
    explanations: [
      "❌ :1497 是 Stencil pass,跟 refraction 无关",
      "✅ AddSubstrateOpaqueRoughRefractionPasses 在 SubstrateRoughRefraction.cpp:79",
      "❌ :2027 是 Sample Material pass(最终合成)",
      "❌ SubstrateVisualize.cpp 只负责 debug 可视化"
    ]
  },
  {
    q: "Substrate 的 tile 大小 (SUBSTRATE_TILE_SIZE) 是?",
    options: ["4", "8", "16", "32"],
    correct: 1,
    explanations: [
      "❌ 4 太小,closure 数据填不满 1 个 tile",
      "✅ SUBSTRATE_TILE_SIZE = 8(SubstrateDefinitions.h),可通过 SUBSTRATE_CLASSIFICATION_TILE_SIZE_16 permutation 升到 16",
      "❌ 16 是另一种可选 tile size(permutation 切换)",
      "❌ 32 太大,atomic tile 内 closure 数据放不下"
    ]
  },

function shuffleArray(arr){const a=[...arr];for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]]}return a}
function shuffleOptions(q){const idx=q.options.map((_,i)=>i);const si=shuffleArray(idx);return{...q,options:si.map(i=>q.options[i]),optionExplanations:si.map(i=>q.optionExplanations[i]),correct:Array.isArray(q.correct)?q.correct.map(o=>si.indexOf(o)).filter(i=>i>=0).sort((a,b)=>a-b):si.indexOf(q.correct)}}
function reshuffleAll(){resetAll();dragQuestions=shuffleArray(_origDrag);singleQuestions=shuffleArray(_origSingle).map(shuffleOptions);multiQuestions=shuffleArray(_origMulti).map(shuffleOptions);trueFalseQuestions=shuffleArray(_origTF);currentIndex=0;renderCurrent()}
function getAllQuestions(){const all=[];dragQuestions.forEach((q,i)=>all.push({type:'drag',idx:i,data:q,mode:'drag',originalIndex:q._origIdx!==undefined?q._origIdx:i}));singleQuestions.forEach((q,i)=>all.push({type:'single',idx:i,data:q,mode:'single',originalIndex:q._origIdx!==undefined?q._origIdx:i}));multiQuestions.forEach((q,i)=>all.push({type:'multi',idx:i,data:q,mode:'multi',originalIndex:q._origIdx!==undefined?q._origIdx:i}));trueFalseQuestions.forEach((q,i)=>all.push({type:'tf',idx:i,data:q,mode:'tf',originalIndex:q._origIdx!==undefined?q._origIdx:i}));return all}
function setMode(mode){currentMode=mode;currentIndex=0;renderCurrent();document.querySelectorAll('.nav-tab').forEach(t=>t.classList.toggle('active',t.dataset.type===mode))}
function totalCount(){return dragQuestions.length+singleQuestions.length+multiQuestions.length+trueFalseQuestions.length}
function answeredCount(){return Object.keys(results).filter(k=>results[k]!==null).length}

function updateScore(){document.getElementById('answered-num').textContent=answeredCount();document.getElementById('correct-num').textContent=correctCount();document.getElementById('wrong-num').textContent=wrongCount();const t=totalCount();document.getElementById('score-pct').textContent=answeredCount()===0?'0%':Math.round(correctCount()/answeredCount()*100)+'%';const cur=getFilteredQuestions().length;document.getElementById('progress-text').textContent=`第 ${Math.min(currentIndex+1,cur)} 题 / 共 ${cur} 题`;document.getElementById('progress-fill').style.width=(cur>0?(Math.min(currentIndex+1,cur)/cur*100)+'%':'0%')}
function getFilteredQuestions(){if(currentMode==='all')return getAllQuestions();return getAllQuestions().filter(q=>q.mode===currentMode)}
function renderCurrent(){const qs=getFilteredQuestions();if(qs.length===0){document.getElementById('questions-container').innerHTML='<div class="card"><p>该题型暂无题目。</p></div>';updateScore();return}currentIndex=Math.max(0,Math.min(currentIndex,qs.length-1));const q=qs[currentIndex];document.getElementById('questions-container').innerHTML='';if(q.mode==='drag')renderDrag(q);else if(q.mode==='single')renderSingle(q);else if(q.mode==='multi')renderMulti(q);else if(q.mode==='tf')renderTrueFalse(q);updateScore()}

function renderDrag(q){const html=`<div class="card"><span class="card-number">${currentIndex+1}</span><span class="q-type">拖拽填空</span><h3>${q.data.text}</h3><div class="drag-pool">${q.data.pool.map(p=>`<span class="draggable" data-term="${p}">${p}</span>`).join('')}</div><div class="action-row"><button class="btn btn-primary" id="check-btn">检查答案</button><button class="btn" id="reset-btn">重置</button></div><div class="feedback" id="fb"></div></div><div class="nav-row"><button class="btn" id="prev-btn">← 上一题</button><button class="btn" id="next-btn">下一题 →</button></div>`;document.getElementById('questions-container').innerHTML=html;setupDragDrop(q);setupNav();setupCheckReset(q,'drag')}
function renderSingle(q){const html=`<div class="card"><span class="card-number">${currentIndex+1}</span><span class="q-type">单选题</span><h3>${q.data.q}</h3><div class="options-list">${q.data.options.map((o,i)=>`<div class="option" data-idx="${i}"><span class="opt-marker">${String.fromCharCode(65+i)}</span><span>${o}</span></div>`).join('')}</div><div class="action-row"><button class="btn btn-primary" id="check-btn">检查答案</button><button class="btn" id="reset-btn">重置</button></div><div class="feedback" id="fb"></div></div><div class="nav-row"><button class="btn" id="prev-btn">← 上一题</button><button class="btn" id="next-btn">下一题 →</button></div>`;document.getElementById('questions-container').innerHTML=html;q.data.options.forEach((_,i)=>{document.querySelector(`.option[data-idx="${i}"]`).addEventListener('click',()=>{document.querySelectorAll('.option').forEach(o=>o.classList.remove('selected'));document.querySelector(`.option[data-idx="${i}"]`).classList.add('selected')})});setupNav();setupCheckReset(q,'single')}

function setupDragDrop(q){const fills=document.querySelectorAll('.drop-zone');fills.forEach((z,i)=>{z.addEventListener('dragover',e=>{e.preventDefault();z.classList.add('drag-over')});z.addEventListener('dragleave',()=>z.classList.remove('drag-over'));z.addEventListener('drop',e=>{e.preventDefault();z.classList.remove('drag-over');const term=e.dataTransfer.getData('text/plain');if(term){z.innerHTML=`<span class="dropped-text">${term}</span>`;z.dataset.filled=term;z.classList.add('filled');document.querySelectorAll('.draggable').forEach(d=>{if(d.dataset.term===term)d.classList.add('used')})}})});document.querySelectorAll('.draggable').forEach(d=>{d.setAttribute('draggable','true');d.addEventListener('dragstart',e=>{e.dataTransfer.setData('text/plain',d.dataset.term)})})}
function setupNav(){const prev=document.getElementById('prev-btn');const next=document.getElementById('next-btn');if(prev)prev.addEventListener('click',()=>{if(currentIndex>0){currentIndex--;renderCurrent()}});if(next)next.addEventListener('click',()=>{const qs=getFilteredQuestions();if(currentIndex<qs.length-1){currentIndex++;renderCurrent()}})}

function checkDrag(q){const fills=document.querySelectorAll('.drop-zone');let allCorrect=true;const exp=[];fills.forEach((z,i)=>{const user=z.dataset.filled||'';const expect=q.data.answers[i];const ok=user===expect;if(!ok)allCorrect=false;z.classList.remove('correct','wrong');z.classList.add(ok?'correct':'wrong');exp.push(q.data.explanations[i])});recordResult('drag',q.originalIndex,allCorrect,null);showFeedback(allCorrect,exp)}
function checkSingle(q){const sel=document.querySelector('.option.selected');if(!sel){alert('请先选择答案');return}const i=parseInt(sel.dataset.idx);const correct=i===q.data.correct;document.querySelectorAll('.option').forEach((o,j)=>{o.classList.remove('correct-mark','wrong-mark');if(j===q.data.correct)o.classList.add('correct-mark');else if(j===i&&!correct)o.classList.add('wrong-mark')});recordResult('single',q.originalIndex,correct,i);showFeedback(correct,q.data.explanations)}
function checkMulti(q){const sels=Array.from(document.querySelectorAll('.option.selected')).map(o=>parseInt(o.dataset.idx));if(sels.length===0){alert('请先选择答案');return}const corr=q.data.correct.slice().sort((a,b)=>a-b);const user=sels.slice().sort((a,b)=>a-b);const ok=JSON.stringify(corr)===JSON.stringify(user);document.querySelectorAll('.option').forEach((o,j)=>{o.classList.remove('correct-mark','wrong-mark');if(corr.includes(j))o.classList.add('correct-mark');else if(sels.includes(j)&&!ok)o.classList.add('wrong-mark')});recordResult('multi',q.originalIndex,ok,sels);showFeedback(ok,q.data.explanations)}

document.getElementById('btn-reset-all').addEventListener('click',()=>{if(confirm('确定重置全部答题记录?'))resetAll()});
document.querySelectorAll('.nav-tab').forEach(t=>t.addEventListener('click',()=>setMode(t.dataset.type)));
document.querySelectorAll('.filter-btn').forEach(b=>b.addEventListener('click',()=>{activeFilter=b.dataset.filter;document.querySelectorAll('.filter-btn').forEach(x=>x.classList.toggle('active',x===b));const items=document.querySelectorAll('.overview-item');items.forEach(item=>{const i=parseInt(item.querySelector('.ov-num').textContent)-1;const q=getAllQuestions()[i];const r=results[`${q.type}-${q.idx}`];let show=true;if(activeFilter==='unanswered')show=!r;else if(activeFilter==='correct')show=r&&r.correct;else if(activeFilter==='wrong')show=r&&!r.correct;item.style.display=show?'':'none'})}));
renderCurrent();
</script>
</body>
</html>
