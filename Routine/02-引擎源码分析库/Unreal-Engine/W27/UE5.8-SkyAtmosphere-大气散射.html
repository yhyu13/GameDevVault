<style>

    q: "CameraAerialPerspectiveVolume 是 3D 纹理,提供相机到 fragment 的体积散射。",
    correct: true,
    explanation: "✅ 正确:AP volume 32x32x32 R16G16B16A16F,编码(camera-relative-position, view direction) → transmittance + in-scattering,体积云和远景颜色查这个 LUT 得到雾化效果。"
  },
  {
    q: "r.SkyAtmosphere.DistantSkyLightLUT 关闭后会提高 SkyLight 实时捕获精度。",
    correct: false,
    explanation: "❌ 反向理解:关闭 DistantSkyLightLut 会让 SkyLight 实时捕获走低效路径(可能是更粗的近似或完全黑屏),开启反而**更快更准**。"
  },
  {
    q: "RayleighDensityExpScale 设 1/8.5 km 是地球真实值,代表 Rayleigh 散射的标尺高度。",
    correct: true,
    explanation: "✅ 正确:Rayleigh 散射强度随高度指数衰减,H=8.5 km 是地球大气典型值,1/H=0.117 就是 1/8.5 ≈ 0.117。这个参数决定天空蓝的垂直分布。"
  }
];

let dragQuestions = JSON.parse(JSON.stringify(_origDrag));
let singleQuestions = JSON.parse(JSON.stringify(_origSingle));
let multiQuestions = JSON.parse(JSON.stringify(_origMulti));
let trueFalseQuestions = JSON.parse(JSON.stringify(_origTF));
let currentMode = 'all';
let currentIndex = 0;
const results = {};
let overviewOpen = false;
let activeFilter = 'all';

function shuffleArray(arr){const a=[...arr];for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]]}return a}
function shuffleOptions(q){const idx=q.options.map((_,i)=>i);const si=shuffleArray(idx);return{...q,options:si.map(i=>q.options[i]),optionExplanations:si.map(i=>q.optionExplanations[i]),correct:Array.isArray(q.correct)?q.correct.map(o=>si.indexOf(o)).filter(i=>i>=0).sort((a,b)=>a-b):si.indexOf(q.correct)}}
function reshuffleAll(){resetAll();dragQuestions=shuffleArray(_origDrag);singleQuestions=shuffleArray(_origSingle).map(shuffleOptions);multiQuestions=shuffleArray(_origMulti).map(shuffleOptions);trueFalseQuestions=shuffleArray(_origTF);currentIndex=0;renderCurrent()}
function getAllQuestions(){const all=[];dragQuestions.forEach((q,i)=>all.push({type:'drag',idx:i,data:q,mode:'drag'}));singleQuestions.forEach((q,i)=>all.push({type:'single',idx:i,data:q,mode:'single'}));multiQuestions.forEach((q,i)=>all.push({type:'multi',idx:i,data:q,mode:'multi'}));trueFalseQuestions.forEach((q,i)=>all.push({type:'tf',idx:i,data:q,mode:'tf'}));return all}
function setMode(mode){currentMode=mode;currentIndex=0;renderCurrent();document.querySelectorAll('.nav-tab').forEach(t=>t.classList.toggle('active',t.dataset.type===mode))}
function totalCount(){return dragQuestions.length+singleQuestions.length+multiQuestions.length+trueFalseQuestions.length}
function answeredCount(){return Object.keys(results).filter(k=>results[k]!==null).length}
function correctCount(){return Object.values(results).filter(r=>r&&r.correct).length}
function wrongCount(){return Object.values(results).filter(r=>r&&!r.correct).length}
function updateScore(){document.getElementById('answered-num').textContent=answeredCount();document.getElementById('correct-num').textContent=correctCount();document.getElementById('wrong-num').textContent=wrongCount();const t=totalCount();document.getElementById('score-pct').textContent=answeredCount()===0?'0%':Math.round(correctCount()/answeredCount()*100)+'%';const cur=getFilteredQuestions().length;document.getElementById('progress-text').textContent=`第 ${Math.min(currentIndex+1,cur)} 题 / 共 ${cur} 题`;document.getElementById('progress-fill').style.width=(cur>0?(Math.min(currentIndex+1,cur)/cur*100)+'%':'0%')}
function getFilteredQuestions(){if(currentMode==='all')return getAllQuestions();return getAllQuestions().filter(q=>q.mode===currentMode)}
function renderCurrent(){const qs=getFilteredQuestions();if(qs.length===0){document.getElementById('questions-container').innerHTML='<div class="card"><p>该题型暂无题目。</p></div>';updateScore();return}currentIndex=Math.max(0,Math.min(currentIndex,qs.length-1));const q=qs[currentIndex];document.getElementById('questions-container').innerHTML='';if(q.mode==='drag')renderDrag(q);else if(q.mode==='single')renderSingle(q);else if(q.mode==='multi')renderMulti(q);else if(q.mode==='tf')renderTrueFalse(q);updateScore()}
function recordResult(type,idx,correct,userAnswer){results[`${type}-${idx}`]={correct,userAnswer};updateScore()}
function resetAll(){for(const k in results)delete results[k];currentIndex=0;renderCurrent();updateOverview()}
function renderDrag(q){const html=`<div class="card"><span class="card-number">${currentIndex+1}</span><span class="q-type">拖拽填空</span><h3>${q.data.text}</h3><div class="drag-pool">${q.data.pool.map(p=>`<span class="draggable" data-term="${p}">${p}</span>`).join('')}</div><div class="action-row"><button class="btn btn-primary" id="check-btn">检查答案</button><button class="btn" id="reset-btn">重置</button></div><div class="feedback" id="fb"></div></div><div class="nav-row"><button class="btn" id="prev-btn">← 上一题</button><button class="btn" id="next-btn">下一题 →</button></div>`;document.getElementById('questions-container').innerHTML=html;setupDragDrop(q);setupNav();setupCheckReset(q,'drag')}
function renderSingle(q){const html=`<div class="card"><span class="card-number">${currentIndex+1}</span><span class="q-type">单选题</span><h3>${q.data.q}</h3><div class="options-list">${q.data.options.map((o,i)=>`<div class="option" data-idx="${i}"><span class="opt-marker">${String.fromCharCode(65+i)}</span><span>${o}</span></div>`).join('')}</div><div class="action-row"><button class="btn btn-primary" id="check-btn">检查答案</button><button class="btn" id="reset-btn">重置</button></div><div class="feedback" id="fb"></div></div><div class="nav-row"><button class="btn" id="prev-btn">← 上一题</button><button class="btn" id="next-btn">下一题 →</button></div>`;document.getElementById('questions-container').innerHTML=html;q.data.options.forEach((_,i)=>{document.querySelector(`.option[data-idx="${i}"]`).addEventListener('click',()=>{document.querySelectorAll('.option').forEach(o=>o.classList.remove('selected'));document.querySelector(`.option[data-idx="${i}"]`).classList.add('selected')})});setupNav();setupCheckReset(q,'single')}
function renderMulti(q){const html=`<div class="card"><span class="card-number">${currentIndex+1}</span><span class="q-type">多选题</span><h3>${q.data.q}</h3><div class="options-list">${q.data.options.map((o,i)=>`<div class="option" data-idx="${i}"><span class="opt-marker">${String.fromCharCode(65+i)}</span><span>${o}</span></div>`).join('')}</div><div class="action-row"><button class="btn btn-primary" id="check-btn">检查答案</button><button class="btn" id="reset-btn">重置</button></div><div class="feedback" id="fb"></div></div><div class="nav-row"><button class="btn" id="prev-btn">← 上一题</button><button class="btn" id="next-btn">下一题 →</button></div>`;document.getElementById('questions-container').innerHTML=html;q.data.options.forEach((_,i)=>{document.querySelector(`.option[data-idx="${i}"]`).addEventListener('click',()=>{document.querySelector(`.option[data-idx="${i}"]`).classList.toggle('selected')})});setupNav();setupCheckReset(q,'multi')}
function renderTrueFalse(q){const html=`<div class="card"><span class="card-number">${currentIndex+1}</span><span class="q-type">判断题</span><h3>${q.data.q}</h3><div class="tf-options"><div class="tf-btn" data-val="true">✅ 正确</div><div class="tf-btn" data-val="false">❌ 错误</div></div><div class="action-row"><button class="btn btn-primary" id="check-btn">检查答案</button><button class="btn" id="reset-btn">重置</button></div><div class="feedback" id="fb"></div></div><div class="nav-row"><button class="btn" id="prev-btn">← 上一题</button><button class="btn" id="next-btn">下一题 →</button></div>`;document.getElementById('questions-container').innerHTML=html;document.querySelectorAll('.tf-btn').forEach(b=>b.addEventListener('click',()=>{document.querySelectorAll('.tf-btn').forEach(x=>x.classList.remove('selected'));b.classList.add('selected')}));setupNav();setupCheckReset(q,'tf')}
function setupDragDrop(q){const fills=document.querySelectorAll('.drop-zone');fills.forEach((z,i)=>{z.addEventListener('dragover',e=>{e.preventDefault();z.classList.add('drag-over')});z.addEventListener('dragleave',()=>z.classList.remove('drag-over'));z.addEventListener('drop',e=>{e.preventDefault();z.classList.remove('drag-over');const term=e.dataTransfer.getData('text/plain');if(term){z.innerHTML=`<span class="dropped-text">${term}</span>`;z.dataset.filled=term;z.classList.add('filled');document.querySelectorAll(`.draggable`).forEach(d=>{if(d.dataset.term===term)d.classList.add('used')})}})});document.querySelectorAll('.draggable').forEach(d=>{d.setAttribute('draggable','true');d.addEventListener('dragstart',e=>{e.dataTransfer.setData('text/plain',d.dataset.term)})})}
function setupNav(){const prev=document.getElementById('prev-btn');const next=document.getElementById('next-btn');if(prev)prev.addEventListener('click',()=>{if(currentIndex>0){currentIndex--;renderCurrent()}});if(next)next.addEventListener('click',()=>{const qs=getFilteredQuestions();if(currentIndex<qs.length-1){currentIndex++;renderCurrent()}})}
function setupCheckReset(q,mode){const cb=document.getElementById('check-btn');const rb=document.getElementById('reset-btn');if(cb)cb.addEventListener('click',()=>{if(mode==='drag')checkDrag(q);else if(mode==='single')checkSingle(q);else if(mode==='multi')checkMulti(q);else if(mode==='tf')checkTF(q);updateOverview()});if(rb)rb.addEventListener('click',()=>renderCurrent())}
function showFeedback(correct,explanations){const fb=document.getElementById('fb');fb.className='feedback show '+(correct?'feedback-correct':'feedback-wrong');fb.innerHTML=`<span class="feedback-title">${correct?'✅ 回答正确！':'❌ 回答错误'}</span><ul>${explanations.map(e=>`<li>${e}</li>`).join('')}</ul>`}
function checkDrag(q){const fills=document.querySelectorAll('.drop-zone');let allCorrect=true;const exp=[];fills.forEach((z,i)=>{const user=z.dataset.filled||'';const expect=q.data.answers[i];const ok=user===expect;if(!ok)allCorrect=false;z.classList.remove('correct','wrong');z.classList.add(ok?'correct':'wrong');exp.push(q.data.explanations[i])});recordResult('drag',q.originalIndex,allCorrect,null);showFeedback(allCorrect,exp)}
function checkSingle(q){const sel=document.querySelector('.option.selected');if(!sel){alert('请先选择答案');return}const i=parseInt(sel.dataset.idx);const correct=i===q.data.correct;document.querySelectorAll('.option').forEach((o,j)=>{o.classList.remove('correct-mark','wrong-mark');if(j===q.data.correct)o.classList.add('correct-mark');else if(j===i&&!correct)o.classList.add('wrong-mark')});recordResult('single',q.originalIndex,correct,i);showFeedback(correct,q.data.explanations)}
function checkMulti(q){const sels=Array.from(document.querySelectorAll('.option.selected')).map(o=>parseInt(o.dataset.idx));if(sels.length===0){alert('请先选择答案');return}const corr=q.data.correct.slice().sort((a,b)=>a-b);const user=sels.slice().sort((a,b)=>a-b);const ok=JSON.stringify(corr)===JSON.stringify(user);document.querySelectorAll('.option').forEach((o,j)=>{o.classList.remove('correct-mark','wrong-mark');if(corr.includes(j))o.classList.add('correct-mark');else if(sels.includes(j)&&!ok)o.classList.add('wrong-mark')});recordResult('multi',q.originalIndex,ok,sels);showFeedback(ok,q.data.explanations)}
function checkTF(q){const sel=document.querySelector('.tf-btn.selected');if(!sel){alert('请先选择');return}const v=sel.dataset.val==='true';const ok=v===q.data.correct;document.querySelectorAll('.tf-btn').forEach(b=>{b.classList.remove('correct-mark','wrong-mark')});document.querySelector(`.tf-btn[data-val="${q.data.correct?'true':'false'}"]`).classList.add('correct-mark');if(!ok)sel.classList.add('wrong-mark');recordResult('tf',q.originalIndex,ok,v);showFeedback(ok,[q.data.explanation])}
function updateOverview(){const grid=document.getElementById('overview-grid');if(!grid)return;grid.innerHTML='';const all=getAllQuestions();all.forEach((q,i)=>{const item=document.createElement('div');item.className='overview-item';const r=results[`${q.type}-${q.idx}`];if(r){item.classList.add(r.correct?'correct':'wrong')}item.innerHTML=`<div class="ov-num">${i+1}</div><div class="ov-type">${q.type}</div>`;item.addEventListener('click',()=>{setMode(q.type);const qs=getFilteredQuestions();currentIndex=qs.findIndex(x=>x.type===q.type&&x.idx===q.idx);overviewOpen=false;document.getElementById('overview-panel').classList.remove('show');renderCurrent()});grid.appendChild(item)})}
document.getElementById('btn-overview').addEventListener('click',()=>{overviewOpen=!overviewOpen;document.getElementById('overview-panel').classList.toggle('show',overviewOpen);if(overviewOpen)updateOverview()});
document.getElementById('btn-reshuffle').addEventListener('click',reshuffleAll);
document.getElementById('btn-reset-all').addEventListener('click',()=>{if(confirm('确定重置全部答题记录?'))resetAll()});
document.querySelectorAll('.nav-tab').forEach(t=>t.addEventListener('click',()=>setMode(t.dataset.type)));
document.querySelectorAll('.filter-btn').forEach(b=>b.addEventListener('click',()=>{activeFilter=b.dataset.filter;document.querySelectorAll('.filter-btn').forEach(x=>x.classList.toggle('active',x===b));const items=document.querySelectorAll('.overview-item');items.forEach(item=>{const i=parseInt(item.querySelector('.ov-num').textContent)-1;const q=getAllQuestions()[i];const r=results[`${q.type}-${q.idx}`];let show=true;if(activeFilter==='unanswered')show=!r;else if(activeFilter==='correct')show=r&&r.correct;else if(activeFilter==='wrong')show=r&&!r.correct;item.style.display=show?'':'none'})}));
renderCurrent();
</script>
</body>
</html>
