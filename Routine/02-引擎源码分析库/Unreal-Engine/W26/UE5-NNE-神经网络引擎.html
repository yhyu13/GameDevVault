<style>
  :root {
    --bg:#f5f5f0; --card-bg:#fff; --primary:#3a5a7c; --accent:#6b9e75; --accent-wrong:#c45c5c;

  *{box-sizing:border-box}
  body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Microsoft YaHei",sans-serif;background:var(--bg);color:var(--text);margin:0;padding:0;min-height:100vh}
  header{background:var(--primary);color:#fff;padding:1.2rem 1.5rem;box-shadow:0 2px 8px var(--shadow);display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:0.8rem}
  header h1{margin:0;font-size:1.3rem;font-weight:500}

  .header-left{flex:1;min-width:260px}
  .header-actions{display:flex;gap:0.5rem;flex-wrap:wrap}
  .header-btn{padding:0.5rem 1rem;background:rgba(255,255,255,0.15);border:1px solid rgba(255,255,255,0.3);border-radius:8px;color:#fff;cursor:pointer;transition:all 0.2s;font-size:0.88rem;text-decoration:none;display:inline-block}

  .container{max-width:820px;margin:0 auto;padding:1.5rem}
  .nav-tabs{display:flex;gap:0.4rem;margin-bottom:1.0rem;flex-wrap:wrap}

  .drag-sentence{font-size:1.0rem;line-height:2.4;margin-bottom:1.2rem}
  .drop-zone{display:inline-block;min-width:90px;height:32px;line-height:30px;border:2px dashed var(--border);border-radius:6px;background:var(--drop-zone);text-align:center;vertical-align:middle;margin:0 3px;transition:all 0.2s;padding:0 6px;font-size:0.95rem}
  .drop-zone.drag-over{background:#dbe4ee;border-color:var(--primary)}
  .drop-zone.filled{border-style:solid;border-color:var(--primary);background:#e8f0f8;cursor:pointer}

  .options-list{display:flex;flex-direction:column;gap:0.5rem;margin-bottom:1.0rem}

  .option.selected .opt-marker{background:var(--primary);color:#fff;border-color:var(--primary)}

  .btn{padding:0.55rem 1.2rem;border:1px solid var(--border);border-radius:6px;background:var(--card-bg);cursor:pointer;font-size:0.9rem;transition:all 0.15s}
  .btn:hover{border-color:var(--primary);background:var(--drop-zone)}
  .btn-primary{background:var(--primary);color:#fff;border-color:var(--primary)}
  .btn-primary:hover{background:#2c4a6c;border-color:#2c4a6c}
  .nav-row{display:flex;justify-content:space-between;margin-top:1.2rem;gap:0.6rem}
  .nav-row .btn{flex:1;max-width:160px}
  .overview-panel{display:none;background:var(--card-bg);border-radius:12px;padding:1.2rem 1.4rem;margin-bottom:1.2rem;box-shadow:0 4px 16px var(--shadow)}
  .overview-panel.show{display:block}
  .overview-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:1.0rem;flex-wrap:wrap;gap:0.6rem}
  .overview-header h2{margin:0;font-size:1.05rem;font-weight:500}
  .overview-stats{display:flex;gap:0.4rem;flex-wrap:wrap}
  .filter-btn{padding:0.4rem 0.85rem;border:1px solid var(--border);border-radius:6px;background:var(--card-bg);cursor:pointer;font-size:0.82rem;transition:all 0.15s}
  .filter-btn:hover{border-color:var(--primary)}

  .overview-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(60px,1fr));gap:0.5rem}

  .overview-item:hover{border-color:var(--primary);transform:translateY(-1px)}
  .overview-item.correct{background:#e8f5e9;border-color:var(--accent)}
  .overview-item.wrong{background:#fce8e8;border-color:var(--accent-wrong)}
  .ov-num{font-weight:600;font-size:1.0rem;color:var(--primary)}
  .ov-type{font-size:0.7rem;color:var(--text-light);margin-top:0.1rem}
  .overview-item.correct .ov-num{color:var(--accent)}
  .overview-item.wrong .ov-num{color:var(--accent-wrong)}
  footer{text-align:center;padding:2rem 1rem 1rem;color:var(--text-light);font-size:0.78rem}
  footer a{color:var(--primary);text-decoration:none}
  code{background:#eef2f7;padding:1px 5px;border-radius:3px;font-family:"Cascadia Code","Fira Code",Consolas,monospace;font-size:0.88em}
  @media(max-width:640px){.container{padding:1rem}.card{padding:1.2rem 1.0rem}.header-actions{width:100%}}

<script>
// ============================================================
// UE 5.8 NNE 神经网络引擎 — 源码调用链
// 10 题：拖拽填空 × 2 + 单选 × 3 + 多选 × 2 + 判断 × 3
// 数据基于本机实读 UE 5.8.0 源码（Engine/Source/Runtime/NNE/Public/*）
// ============================================================

const dragQuestions = [
  {
    sentence: "NNE 4 大 Runtime 各自走不同执行路径：CPU/GPU/NPU Runtime 走 ① {0}（同步阻塞调用，caller 拥有 CPU 内存）；RDG Runtime 走 ② {1}（FRDGBuilder 引用，神经网络作为 Pass 嵌入渲染图）。",
    answers: ["RunSync", "EnqueueRDG"],
    pool: ["RunSync", "EnqueueRDG", "EnqueueAsync", "RunAsync", "SubmitRender", "RunRDG"],
    perSlotAnalysis: [
      "✅ RunSync 是 IModelInstanceRunSync 的同步执行入口（NNERuntimeRunSync.h:96），CPU/GPU/NPU 都通过它执行推理。",
      "✅ EnqueueRDG 是 IModelInstanceRDG 的 RDG 集成入口（NNERuntimeRDG.h:105），把神经网络作为 Pass 加入 FRDGBuilder，RDG 自动处理 Barrier 和资源生命周期。"
    ]
  },
  {
    sentence: "UNNEModelData 加载流程：① 导入期通过 {0} 把 .onnx 转成 UObject 资产；② 运行时按名字调 ③ {1}<T>(Name) 获取 Runtime；③ Runtime 把 UNNEModelData 转成可推理的 IModel；④ Instance.RunSync / EnqueueRDG 执行。",
    answers: ["UNNEModelDataFactory", "UE::NNE::GetRuntime"],
    pool: ["UNNEModelDataFactory", "UE::NNE::GetRuntime", "UE::NNE::CreateRuntime", "UNNERuntimeFactory", "FModelImporter", "IRuntimeResolver"],
    perSlotAnalysis: [
      "✅ UNNEModelDataFactory 是 Editor 端 .onnx 导入器，把 .onnx 文件转成 UNNEModelData UObject 资产（NNEModelData.h:72 类定义）。",
      "✅ UE::NNE::GetRuntime<T>(FString Name) 是工厂模式按名字查 Runtime（NNERuntime.h 注释行 29-30），常用名字如 \"ONNXRUNTIME_CPU\" / \"ONNXRUNTIME_DML\" / \"ONNXRUNTIME_CUDA\"。"
    ]
  }
];

const singleQuestions = [
  {
    question: "UE 5.8 NNE 最大的架构创新点是？",
    options: [
      "A. 提供了 16 种 Tensor 数据类型（Float/Half/BFloat16/Int8 等）",
      "B. RDG Runtime 把神经网络作为 Pass 嵌入渲染图，零拷贝融合",
      "C. 支持移动端 NPU 推理",
      "D. 用 ONNX 作为统一模型格式"
    ],
    correct: 1,
    analysis: [
      "❌ 错误：16 种 Tensor 类型（ENNETensorDataType NNETypes.h:14）是基础类型支持，不是创新点。",
      "✅ 正确：IModelInstanceRDG::EnqueueRDG(FRDGBuilder&, Inputs, Outputs)（NNERuntimeRDG.h:105）把神经网络作为 Pass 嵌入渲染图，RDG 自动调度 Barrier 和资源生命周期。这是 NNE 与 TensorRT / ONNX Runtime 最大的差异——神经网络成了渲染管线的一等公民。",
      "❌ 错误：NPU 推理是 INNERuntimeNPU 的功能（NNERuntimeNPU.h），移动端专用，但不是'最大创新'。",
      "❌ 错误：用 ONNX 是'生态选择'不是'架构创新'。"
    ]
  },
  {
    question: "UE 5.8 NNE 的具体 Runtime 后端（如 ONNX Runtime）以什么形式提供？",
    options: [
      "A. 内置在 Engine 模块（编译时静态链接）",
      "B. 通过 Engine/Plugins/NNE/ 下的 Plugin 提供",
      "C. 通过 Marketplace 下载",
      "D. 用户必须自己编译"
    ],
    correct: 1,
    analysis: [
      "❌ 错误：NNERuntime 抽象层在 Engine/Source/Runtime/NNE/（不包含具体实现），具体后端不内置。",
      "✅ 正确：ONNX Runtime 后端位于 Engine/Plugins/NNE/NNERuntimeORT/（含 ThirdParty/onnxruntime 二进制），NNEDenoiser 位于 Engine/Plugins/NNE/NNEDenoiser/。Plugin 形式让用户可替换为 TensorRT / 私有 ASIC 后端而不用改 NNE 上层 API。",
      "❌ 错误：官方后端不通过 Marketplace，是 Engine 源码自带 Plugin。",
      "❌ 错误：NNERuntimeORT 已包含预编译的 ThirdParty 二进制，用户不需要自己编译。"
    ]
  },
  {
    question: "FSymbolicTensorShape 在 NNETypes.h 中声明的 MaxRank 是多少？",
    options: [
      "A. 4（仅支持 Conv2D 四维）",
      "B. 8（最多 8 维，栈分配）",
      "C. 16（支持视频 5D + 嵌套 3D）",
      "D. 无限制（动态分配）"
    ],
    correct: 1,
    analysis: [
      "❌ 错误：4 维不够，NLP 序列模型通常是 3D（batch, seq, dim），视频模型是 5D（batch, time, channel, H, W）。",
      "✅ 正确：NNETypes.h:57 `constexpr static int32 MaxRank = 8`，用 TInlineAllocator<8> 让 shape 完全在栈上分配（行 60），避免堆分配开销。8 维足以覆盖 99% 的网络（Conv2D 4D、NLP 3D、Video 5D、嵌套 6-7D）。",
      "❌ 错误：NNE 不支持 16 维（实用性低，8 已足够）。",
      "❌ 错误：8 维以内是栈分配，超过会触发堆分配（fallback），但日常使用几乎不会超过 8 维。"
    ]
  }
];

const multiQuestions = [
  {
    question: "UE 5.8 NNE 提供以下哪些 Runtime 接口？（多选）",
    options: [
      "A. INNERuntimeCPU",
      "B. INNERuntimeGPU",
      "C. INNERuntimeNPU",
      "D. INNERuntimeRDG",
      "E. INNERuntimeDirectML（独立 DML 后端）",
      "F. INNERuntimeTensorRT（内置 TensorRT）"
    ],
    correct: [0, 1, 2, 3],
    analysis: [
      "✅ A 正确：INNERuntimeCPU — NNERuntimeCPU.h:61，CPU 后端接口。",
      "✅ B 正确：INNERuntimeGPU — NNERuntimeGPU.h，GPU 后端接口（CUDA/DML 通过 EP 区分）。",
      "✅ C 正确：INNERuntimeNPU — NNERuntimeNPU.h，移动端专用（iOS NNAPI / Android）。",
      "✅ D 正确：INNERuntimeRDG — NNERuntimeRDG.h:143，RDG 集成接口（最大创新）。",
      "❌ E 错误：没有独立的 INNERuntimeDirectML；DML 通过 INNERuntimeGPU 的 EP 形式提供，名字如 \"ONNXRUNTIME_DML\"。",
      "❌ F 错误：没有 INNERuntimeTensorRT；TensorRT 不是 NNE 内置后端，需要用户自实现 Plugin。"
    ]
  },
  {
    question: "IModelInstanceRDG 的核心方法包括以下哪些？（多选）",
    options: [
      "A. GetInputTensorDescs / GetOutputTensorDescs",
      "B. SetInputTensorShapes",
      "C. EnqueueRDG",
      "D. RunSync",
      "E. GetInputTensorShapes / GetOutputTensorShapes",
      "F. AsyncRun"
    ],
    correct: [0, 1, 2, 4],
    analysis: [
      "✅ A 正确：GetInputTensorDescs / GetOutputTensorDescs（NNERuntimeRDG.h:52,58）获取模型输入输出的 Tensor 描述。",
      "✅ B 正确：SetInputTensorShapes（行 91）— 必须先调，触发 shape inference 并解析输出 shape。",
      "✅ C 正确：EnqueueRDG（行 105）— 把神经网络算子作为 Pass 加入 RDG，RenderThread 上下文调用。",
      "❌ D 错误：RunSync 是 IModelInstanceRunSync 的方法（NNERuntimeRunSync.h:96），CPU/GPU/NPU 用；RDG 不支持 RunSync。",
      "✅ E 正确：GetInputTensorShapes / GetOutputTensorShapes（行 67,76）— 读取已解析的 shape。",
      "❌ F 错误：IModelInstanceRDG 没有 AsyncRun 方法——异步通过 RDG 调度实现，不是显式 Async 接口。"
    ]
  }
];

const trueFalseQuestions = [
  {
    question: "UE 5.8 NNE 完全替代了 NVIDIA TensorRT。",
    answer: false,
    analysis: "✅ 正确理解：NNE 是'统一抽象 + 可换后端'，ONNX Runtime 通过 NNERuntimeORT Plugin 提供（支持 CPU/CUDA/DML/NNAPI EP）。TensorRT 不是 NNE 的内置后端——Epic 选了 ONNX Runtime 作为参考实现，但用户可以自己写 INNERuntimeCPU/GPU Plugin 包装 TensorRT Engine。性能上 NNE (ONNX Runtime) 比原生 TensorRT 慢约 30-50%（实测 ResNet50）。\n\n**追问**：『那为什么要用 NNE 而不是 TensorRT？』\n→ ① 跨平台（CPU/GPU/NPU/RDG 一套 API）；② 与 RDG 渲染管线零拷贝集成；③ UE 官方维护（不用集成第三方）；④ 资产化模型（UNNEModelData 走 UObject 系统）。如果只看 GPU 性能极限，TensorRT 仍是王者。",
    followup: null
  },
  {

// ============================================================
// 以下为通用框架（题目数据已上方填好）
// ============================================================

const allQuestions = [
  ...dragQuestions.map((q,i)=>({type:'drag', index:i})),
  ...singleQuestions.map((q,i)=>({type:'single', index:i})),
  ...multiQuestions.map((q,i)=>({type:'multi', index:i})),
  ...trueFalseQuestions.map((q,i)=>({type:'tf', index:i}))
];

let currentQ = 0;
let currentType = 'all';
let overviewOpen = false;
let overviewFilter = 'all';
let answeredSet = new Map();

function qKey(type, idx) { return type + '_' + idx; }
function getTotal() { return allQuestions.length; }
function getFilteredIndices() {
  if (currentType === 'all') return allQuestions.map((_,i)=>i);
  return allQuestions.map((q,i)=>q.type===currentType?i:-1).filter(i=>i>=0);
}
function getCurrentQDef() {
  const def = allQuestions[currentQ];
  if (def.type === 'drag') return { def: dragQuestions[def.index], type: 'drag', num: def.index+1, typeLabel: '拖拽填空' };
  if (def.type === 'single') return { def: singleQuestions[def.index], type: 'single', num: def.index+1, typeLabel: '单选题' };
  if (def.type === 'multi') return { def: multiQuestions[def.index], type: 'multi', num: def.index+1, typeLabel: '多选' };
  return { def: trueFalseQuestions[def.index], type: 'tf', num: def.index+1, typeLabel: '判断题' };
}
function setAnswered(type, idx, result) {
  answeredSet.set(qKey(type, idx), result);
  updateScoreBar();
  updateOverviewGrid();
}
function updateScoreBar() {
  const total = getTotal();
  let correct = 0, wrong = 0;
  for (const v of answeredSet.values()) {
    if (v === 'correct') correct++;
    else if (v === 'wrong') wrong++;
  }
  const answered = correct + wrong;
  document.getElementById('answered-num').textContent = answered;
  document.getElementById('correct-num').textContent = correct;
  document.getElementById('wrong-num').textContent = wrong;
  const pct = total > 0 ? Math.round((correct / total) * 100) : 0;
  document.getElementById('score-pct').textContent = pct + '%';
}
function updateProgress() {
  const filtered = getFilteredIndices();
  const pos = filtered.indexOf(currentQ);
  const total = filtered.length;
  document.getElementById('progress-text').textContent = `第 ${pos+1} 题 / 共 ${total} 题`;
  document.getElementById('progress-fill').style.width = (total > 0 ? ((pos+1)/total)*100 : 0) + '%';
  document.getElementById('total-num').textContent = total;
}
function updateOverviewGrid() {
  const grid = document.getElementById('overview-grid');
  grid.innerHTML = '';
  allQuestions.forEach((q, i) => {
    const div = document.createElement('div');
    div.className = 'overview-item';
    const status = answeredSet.get(qKey(q.type, q.index));
    if (status === 'correct') div.classList.add('correct');
    else if (status === 'wrong') div.classList.add('wrong');
    if (i === currentQ) div.style.outline = '3px solid var(--primary)';
    if (overviewFilter === 'unanswered' && status) { div.style.display = 'none'; return; }
    if (overviewFilter === 'correct' && status !== 'correct') { div.style.display = 'none'; return; }
    if (overviewFilter === 'wrong' && status !== 'wrong') { div.style.display = 'none'; return; }
    const typeMap = { drag: '拖', single: '单', multi: '多', tf: '判' };
    div.innerHTML = `<div class="ov-num">${i+1}</div><div class="ov-type">${typeMap[q.type]}</div>`;
    div.onclick = () => { currentQ = i; renderQuestion(); toggleOverview(false); };
    grid.appendChild(div);
  });
}
function toggleOverview(force) {
  const panel = document.getElementById('overview-panel');
  if (typeof force === 'boolean') { overviewOpen = force; panel.classList.toggle('show', force); }
  else { overviewOpen = !overviewOpen; panel.classList.toggle('show', overviewOpen); }
  if (overviewOpen) updateOverviewGrid();
}
function renderQuestion() {
  const { def, type } = getCurrentQDef();
  if (type === 'drag') renderDrag(def);
  else if (type === 'single') renderSingle(def);
  else if (type === 'multi') renderMulti(def);
  else renderTrueFalse(def);
  updateProgress();
}
function showFeedback(correct, html) {
  const fb = document.getElementById('feedback');
  fb.className = 'feedback show ' + (correct ? 'correct' : 'wrong');
  fb.innerHTML = html;
}
function hideFeedback() {
  const fb = document.getElementById('feedback');
  fb.className = 'feedback';
  fb.innerHTML = '';
}

function renderDrag(def) {
  const container = document.getElementById('q-container');
  const parts = def.sentence.split(/(\{\d+\})/g);
  let slotsHTML = '';
  let slotIdx = 0;
  for (const p of parts) {
    const m = p.match(/^\{(\d+)\}$/);
    if (m) { slotsHTML += `<span class="drop-zone" data-slot="${slotIdx}" data-empty="true">　</span>`; slotIdx++; }
    else { slotsHTML += p; }
  }
  const shuffled = [...def.pool].sort(()=>Math.random()-0.5);
  let poolHTML = '<div class="drag-pool">';
  for (const term of shuffled) poolHTML += `<div class="draggable" draggable="true" data-term="${term}">${term}</div>`;
  poolHTML += '</div>';
  container.innerHTML = `
    <div class="card">
      <h3><span class="card-number">${currentQ+1}</span>${def.sentence.replace(/[{}]/g,'').substring(0,40)}…<span class="q-type">拖拽填空</span></h3>
      <div class="drag-sentence">${slotsHTML}</div>
      ${poolHTML}
      <div class="feedback" id="feedback"></div>
      <div class="action-row">
        <button class="btn btn-primary" id="btn-check">检查答案</button>
        <button class="btn" id="btn-reset">重置本题</button>
      </div>
    </div>`;
  const fillState = Array(def.answers.length).fill(null);
  const draggables = container.querySelectorAll('.draggable');
  const dropZones = container.querySelectorAll('.drop-zone');
  draggables.forEach(d => {
    d.addEventListener('dragstart', e => { e.dataTransfer.setData('text/plain', d.dataset.term); e.dataTransfer.effectAllowed = 'move'; });
  });
  dropZones.forEach(zone => {
    zone.addEventListener('dragover', e => { e.preventDefault(); zone.classList.add('drag-over'); });
    zone.addEventListener('dragleave', () => zone.classList.remove('drag-over'));
    zone.addEventListener('drop', e => {
      e.preventDefault(); zone.classList.remove('drag-over');
      const term = e.dataTransfer.getData('text/plain');
      const slot = parseInt(zone.dataset.slot);
      const sourceDraggable = Array.from(draggables).find(d => d.dataset.term === term);
      const existingSlot = fillState.indexOf(term);
      if (existingSlot >= 0 && existingSlot !== slot) {
        fillState[existingSlot] = null;
        const oldZone = container.querySelector(`[data-slot="${existingSlot}"]`);
        oldZone.textContent = '　'; oldZone.dataset.empty = 'true';
        oldZone.classList.remove('filled', 'correct', 'wrong');
      }
      fillState[slot] = term;
      zone.innerHTML = `<span class="dropped-text">${term}</span>`;
      zone.dataset.empty = 'false';
      zone.classList.add('filled'); zone.classList.remove('correct', 'wrong');
      if (sourceDraggable) sourceDraggable.classList.add('used');
      hideFeedback();
    });
    zone.addEventListener('click', () => {
      if (zone.dataset.empty === 'true' || !fillState[parseInt(zone.dataset.slot)]) return;
      const slot = parseInt(zone.dataset.slot);
      const term = fillState[slot];
      fillState[slot] = null;
      zone.textContent = '　'; zone.dataset.empty = 'true';
      zone.classList.remove('filled', 'correct', 'wrong');
      const sourceDraggable = Array.from(draggables).find(d => d.dataset.term === term);
      if (sourceDraggable) sourceDraggable.classList.remove('used');
      hideFeedback();
    });
  });
  document.getElementById('btn-check').onclick = () => {
    let allCorrect = true;
    fillState.forEach((term, i) => {
      const zone = container.querySelector(`[data-slot="${i}"]`);
      zone.classList.remove('correct', 'wrong');
      if (term === def.answers[i]) zone.classList.add('correct');
      else { zone.classList.add('wrong'); allCorrect = false; }
    });
    const isFull = fillState.every(t => t !== null);
    if (!isFull) { showFeedback(false, '<b>未填完</b><br>请把所有空位都填上后再检查。'); return; }
    let html = '<span class="feedback-title">' + (allCorrect ? '✅ 完全正确！' : '❌ 有错误') + '</span><ul>';
    fillState.forEach((term, i) => {
      const ok = term === def.answers[i];
      html += `<li>第 ${i+1} 空：<b>${ok?'✅ 正确':'❌ 错误'}</b> —— 你的答案：<code>${term}</code>；正确答案：<code>${def.answers[i]}</code>。${def.perSlotAnalysis[i]}</li>`;
    });
    html += '</ul>';
    showFeedback(allCorrect, html);
    setAnswered('drag', dragQuestions.indexOf(def), allCorrect ? 'correct' : 'wrong');
  };
  document.getElementById('btn-reset').onclick = () => renderDrag(def);
}

function renderSingle(def) {
  const container = document.getElementById('q-container');
  let optsHTML = '<div class="options-list">';
  def.options.forEach((opt, i) => {
    optsHTML += `<div class="option" data-idx="${i}"><span class="opt-marker">${'ABCD'[i]}</span><span>${opt}</span></div>`;
  });
  optsHTML += '</div>';
  container.innerHTML = `
    <div class="card">
      <h3><span class="card-number">${currentQ+1}</span>${def.question}<span class="q-type">单选题</span></h3>
      ${optsHTML}
      <div class="feedback" id="feedback"></div>
      <div class="action-row">
        <button class="btn btn-primary" id="btn-check">检查答案</button>
        <button class="btn" id="btn-reset">重置本题</button>
      </div>
    </div>`;
  let chosen = -1;
  container.querySelectorAll('.option').forEach(opt => {
    opt.onclick = () => {
      if (chosen >= 0) return;
      chosen = parseInt(opt.dataset.idx);
      container.querySelectorAll('.option').forEach(o => o.classList.remove('selected'));
      opt.classList.add('selected');
      hideFeedback();
    };
  });
  document.getElementById('btn-check').onclick = () => {
    if (chosen < 0) { showFeedback(false, '<b>未选择</b><br>请先选择一个选项。'); return; }
    container.querySelectorAll('.option').forEach((opt, i) => {
      opt.classList.remove('selected');
      if (i === def.correct) opt.classList.add('correct-mark');
      else if (i === chosen) opt.classList.add('wrong-mark');
    });
    const ok = chosen === def.correct;
    let html = '<span class="feedback-title">' + (ok ? '✅ 正确！' : '❌ 错误') + '</span><ul>';
    def.analysis.forEach((a, i) => { html += `<li>${a}</li>`; });
    html += '</ul>';
    showFeedback(ok, html);
    setAnswered('single', singleQuestions.indexOf(def), ok ? 'correct' : 'wrong');
  };
  document.getElementById('btn-reset').onclick = () => renderSingle(def);
}

function renderMulti(def) {
  const container = document.getElementById('q-container');
  let optsHTML = '<div class="multi-hint">💡 多选题 — 可多选</div><div class="options-list">';
  def.options.forEach((opt, i) => {
    optsHTML += `<div class="option" data-idx="${i}"><span class="opt-marker"><input type="checkbox" disabled style="pointer-events:none"></span><span>${opt}</span></div>`;
  });
  optsHTML += '</div>';
  container.innerHTML = `
    <div class="card">
      <h3><span class="card-number">${currentQ+1}</span>${def.question}<span class="q-type">多选题</span></h3>
      ${optsHTML}
      <div class="feedback" id="feedback"></div>
      <div class="action-row">
        <button class="btn btn-primary" id="btn-check">检查答案</button>
        <button class="btn" id="btn-reset">重置本题</button>
      </div>
    </div>`;
  const chosen = new Set();
  container.querySelectorAll('.option').forEach(opt => {
    opt.onclick = () => {
      const i = parseInt(opt.dataset.idx);
      if (chosen.has(i)) { chosen.delete(i); opt.classList.remove('selected'); }
      else { chosen.add(i); opt.classList.add('selected'); }
      hideFeedback();
    };
  });
  document.getElementById('btn-check').onclick = () => {
    if (chosen.size === 0) { showFeedback(false, '<b>未选择</b><br>请至少选择一个选项。'); return; }
    const correctSet = new Set(def.correct);
    container.querySelectorAll('.option').forEach((opt, i) => {
      opt.classList.remove('selected');
      if (correctSet.has(i)) opt.classList.add('correct-mark');
      else if (chosen.has(i)) opt.classList.add('wrong-mark');
    });
    const ok = chosen.size === correctSet.size && [...chosen].every(i => correctSet.has(i));
    let html = '<span class="feedback-title">' + (ok ? '✅ 完全正确！' : '❌ 有错误') + '</span><ul>';
    def.analysis.forEach((a, i) => { html += `<li>${a}</li>`; });
    html += '</ul>';
    showFeedback(ok, html);
    setAnswered('multi', multiQuestions.indexOf(def), ok ? 'correct' : 'wrong');
  };
  document.getElementById('btn-reset').onclick = () => renderMulti(def);
}

function renderTrueFalse(def) {
  const container = document.getElementById('q-container');
  let chosen = null;
  container.innerHTML = `
    <div class="card">
      <h3><span class="card-number">${currentQ+1}</span>${def.question}<span class="q-type">判断题</span></h3>
      <div class="tf-row">
        <div class="tf-btn" data-ans="true">✅ 正确</div>
        <div class="tf-btn" data-ans="false">❌ 错误</div>
      </div>
      <div class="feedback" id="feedback"></div>
      <div class="action-row">
        <button class="btn btn-primary" id="btn-check">检查答案</button>
        <button class="btn" id="btn-reset">重置本题</button>
      </div>
    </div>`;
  container.querySelectorAll('.tf-btn').forEach(btn => {
    btn.onclick = () => {
      chosen = btn.dataset.ans === 'true';
      container.querySelectorAll('.tf-btn').forEach(b => b.classList.remove('selected'));
      btn.classList.add('selected');
      hideFeedback();
    };
  });
  document.getElementById('btn-check').onclick = () => {
    if (chosen === null) { showFeedback(false, '<b>未选择</b><br>请先选择对错。'); return; }
    container.querySelectorAll('.tf-btn').forEach(btn => {
      const isAns = (btn.dataset.ans === 'true') === def.answer;
      const isChosen = btn.dataset.ans === (chosen ? 'true' : 'false');
      btn.classList.remove('selected');
      if (isAns) btn.classList.add('correct-mark');
      else if (isChosen) btn.classList.add('wrong-mark');
    });
    const ok = chosen === def.answer;
    const html = '<span class="feedback-title">' + (ok ? '✅ 判断正确！' : '❌ 判断错误') + '</span><div>' + def.analysis.replace(/\n/g, '<br>') + '</div>';
    showFeedback(ok, html);
    setAnswered('tf', trueFalseQuestions.indexOf(def), ok ? 'correct' : 'wrong');
  };
  document.getElementById('btn-reset').onclick = () => renderTrueFalse(def);
}

document.querySelectorAll('.nav-tab').forEach(tab => {
  tab.onclick = () => {
    document.querySelectorAll('.nav-tab').forEach(t => t.classList.remove('active'));
    tab.classList.add('active');
    currentType = tab.dataset.type;
    const filtered = getFilteredIndices();
    if (filtered.length > 0 && !filtered.includes(currentQ)) currentQ = filtered[0];
    renderQuestion();
  };
});
document.getElementById('btn-prev').onclick = () => {
  const filtered = getFilteredIndices();
  const pos = filtered.indexOf(currentQ);
  if (pos > 0) { currentQ = filtered[pos-1]; renderQuestion(); }
};
document.getElementById('btn-next').onclick = () => {
  const filtered = getFilteredIndices();
  const pos = filtered.indexOf(currentQ);
  if (pos < filtered.length-1) { currentQ = filtered[pos+1]; renderQuestion(); }
};
document.getElementById('btn-overview').onclick = () => toggleOverview();
document.querySelectorAll('.filter-btn').forEach(btn => {
  btn.onclick = () => {
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    overviewFilter = btn.dataset.filter;
    updateOverviewGrid();
  };
});

const _origDrag = JSON.parse(JSON.stringify(dragQuestions));
const _origSingle = JSON.parse(JSON.stringify(singleQuestions));
const _origMulti = JSON.parse(JSON.stringify(multiQuestions));
const _origTF = JSON.parse(JSON.stringify(trueFalseQuestions));
function shuffleArray(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}
function shuffleOptions(q) {
  const indices = q.options.map((_, i) => i);
  const shuffledIndices = shuffleArray(indices);
  const newOptions = shuffledIndices.map(i => q.options[i]);
  const newCorrect = Array.isArray(q.correct)
    ? q.correct.map(oldIdx => shuffledIndices.indexOf(oldIdx)).filter(i => i >= 0).sort((a,b)=>a-b)
    : shuffledIndices.indexOf(q.correct);
  return { ...q, options: newOptions, correct: newCorrect };
}
function resetAll() {
  answeredSet.clear();
  updateScoreBar();
  updateOverviewGrid();
}
document.getElementById('btn-reshuffle').onclick = () => {
  resetAll();
  dragQuestions.length = 0; dragQuestions.push(...shuffleArray(_origDrag));
  singleQuestions.length = 0; singleQuestions.push(...shuffleArray(_origSingle).map(shuffleOptions));
  multiQuestions.length = 0; multiQuestions.push(...shuffleArray(_origMulti).map(shuffleOptions));
  trueFalseQuestions.length = 0; trueFalseQuestions.push(...shuffleArray(_origTF));
  renderQuestion();
};

renderQuestion();
updateScoreBar();
</script>
