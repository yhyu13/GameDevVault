<script>
(function() {

    blanks: ["lightEnergy", "transmittance", "早期"],
    pool: ["lightEnergy", "transmittance", "早期", "albedo", "opacity", "延迟", "深度"],
    explanation: "体积云 Shader 中，lightEnergy 积累光能，transmittance 表示光线穿透率；当 transmittance < 0.01 时执行早期退出（Early Exit）优化。",

  {

    blanks: ["128", "64", "32"],
    pool: ["128", "64", "32", "256", "48", "16", "96"],

    blankExplanations: [

const singleQuestions = [
  {
    question: "为什么体积云 Ray Marching 需要'早期退出'（transmittance < 0.01 break）？",
    options: [
      "A. 为了让云更透明",
      "B. 减少无贡献步进，优化性能",
      "C. 为了增加光线穿透",
      "D. 为了简化 Shader 代码"
    ],
    correct: 1,
    explanation: "当 transmittance 接近 0 时，后续步进对最终颜色几乎没有贡献，提前退出可显著减少计算量，提升性能。",
    detailLink: "../../../03-Shader与特效案例集/体积云-Volumetric-Cloud.md",
    optionExplanations: [
      "早期退出不会刻意让云更透明，而是当已经足够不透明时停止。",

      "早期退出不是为了增加穿透，而是因为已经几乎没有穿透了。",
      "代码复杂度并没有因此简化，这是运行时优化而非代码简化。"
    ]
  },
  {
    question: "体积云边缘锯齿的最佳解决方案是什么？",

    ],
    correct: 1,
    explanation: "蓝噪声抖动提供时域上的采样分布，配合 TAA 复用历史帧信息，是体积云边缘锯齿的标准解决方案。",
    detailLink: "../../../03-Shader与特效案例集/体积云-Volumetric-Cloud.md",
    optionExplanations: [
      "增加步数可以改善质量但开销大，且不是边缘锯齿的针对性方案。",

      "降低分辨率会加剧锯齿问题，而非解决。",
      "FXAA 是后处理抗锯齿，但体积云需要时域采样配合，TAA 更优。"
    ]
  },
  {
    question: "摄像机朝向地平线时性能波动的原因是什么？",
    options: [
      "A. 云层密度在地平线更高",

      "D. 相机视锥裁剪失效"
    ],
    correct: 1,
    explanation: "摄像机朝向地平线时，视线与云层夹角小，射线穿过云层的路径变长，导致步进次数增加，性能下降。",
    detailLink: "../../../03-Shader与特效案例集/体积云-Volumetric-Cloud.md",
    optionExplanations: [
      "云层密度分布不因地平线方向而显著变化。",
      "正确。射线穿过的云层厚度增加，Ray Marching 步数与路径长度成正比。",
      "光照计算复杂度不随视角方向显著变化。",
      "视锥裁剪在地平线处仍然有效，不是性能波动原因。"
    ]
  }
];

const multiQuestions = [
  {
    question: "体积云的性能优化手段包括哪些？",
    options: [
      "A. 早期退出（Early Exit）",

let userSingleAnswer = null;
let userMultiAnswers = [];
let userTFAnswer = null;
let answered = false;

// ==================== Utils ====================
function shuffleArray(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function shuffleOptions(q) {
  const indices = q.options.map((_, i) => i);
  const shuffled = shuffleArray(indices);
  const newOptions = shuffled.map(i => q.options[i]);
  const newExplanations = shuffled.map(i => q.optionExplanations[i]);
  const newCorrect = Array.isArray(q.correct)
    ? q.correct.map(oi => shuffled.indexOf(oi)).filter(i => i >= 0).sort((a,b)=>a-b)
    : shuffled.indexOf(q.correct);
  return { ...q, options: newOptions, optionExplanations: newExplanations, correct: newCorrect };
}

function rebuildAllQuestions() {
  allQuestions.length = 0;
  dragQuestions.forEach((q,i)=>allQuestions.push({mode:'drag',index:i,question:q.sentence.substring(0,40)+'...',type:'drag'}));
  singleQuestions.forEach((q,i)=>allQuestions.push({mode:'single',index:i,question:q.question.substring(0,40)+'...',type:'single'}));
  multiQuestions.forEach((q,i)=>allQuestions.push({mode:'multi',index:i,question:q.question.substring(0,40)+'...',type:'multi'}));
  trueFalseQuestions.forEach((q,i)=>allQuestions.push({mode:'tf',index:i,question:q.statement.substring(0,40)+'...',type:'tf'}));
}

function initScores() {
  dragScores = Array(dragQuestions.length).fill(null);
  singleScores = Array(singleQuestions.length).fill(null);
  multiScores = Array(multiQuestions.length).fill(null);
  tfScores = Array(trueFalseQuestions.length).fill(null);
}

function resetCurrent() {
  answered = false;
  userDragAnswers = [];
  userSingleAnswer = null;
  userMultiAnswers = [];
  userTFAnswer = null;
}

function resetAll() {
  currentDragIndex = 0; currentSingleIndex = 0; currentMultiIndex = 0; currentTFIndex = 0;
  initScores();
  resetCurrent();
  updateProgress();
}

function reshuffleAll() {
  resetAll();
  const newDrag = shuffleArray(_origDrag);
  dragQuestions.length = 0;
  newDrag.forEach(q => dragQuestions.push(q));
  
  const newSingle = shuffleArray(_origSingle).map(shuffleOptions);
  singleQuestions.length = 0;
  newSingle.forEach(q => singleQuestions.push(q));
  
  const newMulti = shuffleArray(_origMulti).map(shuffleOptions);
  multiQuestions.length = 0;
  newMulti.forEach(q => multiQuestions.push(q));
  
  const newTF = shuffleArray(_origTF);
  trueFalseQuestions.length = 0;
  newTF.forEach(q => trueFalseQuestions.push(q));
  
  rebuildAllQuestions();
  updateDashboard();
  updateProgress();
  if (currentMode === 'drag') renderDrag();
  else if (currentMode === 'single') renderSingle();
  else if (currentMode === 'multi') renderMulti();
  else if (currentMode === 'tf') renderTrueFalse();
}

function updateProgress() {
  const total = dragQuestions.length + singleQuestions.length + multiQuestions.length + trueFalseQuestions.length;
  const answeredCount = dragScores.filter(s=>s!==null).length + singleScores.filter(s=>s!==null).length + multiScores.filter(s=>s!==null).length + tfScores.filter(s=>s!==null).length;
  document.getElementById('progress-text').textContent = answeredCount + ' / ' + total;
  document.getElementById('progress-fill').style.width = (total ? (answeredCount/total*100) : 0) + '%';
}

function switchMode(mode) {
  currentMode = mode;
  document.querySelectorAll('.mode-tab').forEach(tab => {
    tab.classList.toggle('active', tab.dataset.mode === mode);
  });
  document.getElementById('quiz-area').classList.remove('hidden');
  document.getElementById('dashboard-area').classList.remove('show');
  document.getElementById('dashboard-btn').classList.remove('active');
  resetCurrent();
  if (mode === 'drag') renderDrag();
  else if (mode === 'single') renderSingle();
  else if (mode === 'multi') renderMulti();
  else if (mode === 'tf') renderTrueFalse();
}

function toggleDashboard() {
  const quizArea = document.getElementById('quiz-area');
  const dashArea = document.getElementById('dashboard-area');
  const btn = document.getElementById('dashboard-btn');
  if (dashArea.classList.contains('show')) {
    dashArea.classList.remove('show');
    quizArea.classList.remove('hidden');
    btn.classList.remove('active');
  } else {
    dashArea.classList.add('show');
    quizArea.classList.add('hidden');
    btn.classList.add('active');
    updateDashboard();
  }
}

function updateDashboard() {
  const dash = document.getElementById('dashboard-area');
  dash.innerHTML = '';
  allQuestions.forEach((item, idx) => {
    const thumb = document.createElement('div');
    thumb.className = 'thumb';
    let scoreArr, qIdx, status, label;
    if (item.mode === 'drag') { scoreArr = dragScores; qIdx = item.index; label = '拖拽'; }
    else if (item.mode === 'single') { scoreArr = singleScores; qIdx = item.index; label = '单选'; }
    else if (item.mode === 'multi') { scoreArr = multiScores; qIdx = item.index; label = '多选'; }
    else { scoreArr = tfScores; qIdx = item.index; label = '判断'; }
    const s = scoreArr[qIdx];
    if (s === true) { thumb.classList.add('correct'); status = '✅ 正确'; }
    else if (s === false) { thumb.classList.add('wrong'); status = '❌ 错误'; }
    else { thumb.classList.add('unanswered'); status = '⏳ 未作答'; }
    thumb.innerHTML = '<span class="thumb-type ' + item.type + '">' + label + '</span><div class="thumb-question">' + item.question + '</div><div class="thumb-status">' + status + '</div>';
    thumb.onclick = () => { toggleDashboard(); switchMode(item.mode); };
    dash.appendChild(thumb);
  });
}

function updateDashboardStats() {
  updateDashboard();
}

// ==================== Drag ====================
function renderDrag() {
  const q = dragQuestions[currentDragIndex];
  const el = document.getElementById('quiz-area');
  let html = '<div class="card">';
  html += '<div class="card-subtitle">拖拽填空 · 第 ' + (currentDragIndex+1) + ' / ' + dragQuestions.length + ' 题</div>';
  html += '<div class="question-text">' + q.sentence.replace(/\{([0-9]+)\}/g, (m, i) => {
    const val = userDragAnswers[i] || '';
    const cls = val ? 'filled' : '';
    return '<span class="blank ' + cls + '" data-index="' + i + '" onclick="handleBlankClick(' + i + ')">' + (val || ' ') + '</span>';
  }) + '</div>';
  html += '<div class="drag-pool">';
  q.pool.forEach((item, i) => {
    const used = userDragAnswers.includes(item);
    html += '<span class="drag-item' + (used ? ' used' : '') + '" draggable="true" data-val="' + item + '" ondragstart="handleDragStart(event)" onclick="handleDragClick('\'' + item + '\'')">' + item + '</span>';
  });
  html += '</div>';
  html += '<div class="nav-btns">';
  html += '<button class="btn btn-secondary" onclick="prevDrag()" ' + (currentDragIndex===0?'disabled':'') + '>上一题</button>';
  html += '<button class="btn" onclick="checkDrag()">提交</button>';
  html += '<button class="btn" onclick="nextDrag()">下一题</button>';
  html += '</div>';
  if (answered) {
    html += '<div class="score-display ' + (dragScores[currentDragIndex]?'correct':'wrong') + '">' + (dragScores[currentDragIndex]?'✅ 正确':'❌ 错误') + '</div>';
    html += '<div class="explanation show"><div class="explanation-title">解析</div><p>' + q.explanation + '</p>';
    if (q.detailLink) html += '<p><a href="' + q.detailLink + '" target="_blank">📄 查看笔记原文</a></p>';
    if (q.blankExplanations) {
      html += '<ul>';
      q.blankExplanations.forEach((be, i) => {
        html += '<li><strong>空 ' + (i+1) + ' (' + q.blanks[i] + '):</strong> ' + be + '</li>';
      });
      html += '</ul>';
    }
    html += '</div>';
  }
  html += '</div>';
  el.innerHTML = html;
}

window.handleDragStart = function(e) { e.dataTransfer.setData('text/plain', e.target.dataset.val); };
window.handleDragClick = function(val) {
  if (answered) return;
  const blankIdx = userDragAnswers.indexOf(null) >= 0 ? userDragAnswers.indexOf(null) : userDragAnswers.length;
  if (blankIdx < dragQuestions[currentDragIndex].blanks.length) {
    userDragAnswers[blankIdx] = val;
    renderDrag();
  }
};
window.handleBlankClick = function(idx) {
  if (answered) return;
  userDragAnswers[idx] = null;
  renderDrag();
};
window.checkDrag = function() {
  const q = dragQuestions[currentDragIndex];
  let correct = true;
  for (let i = 0; i < q.blanks.length; i++) {
    if (userDragAnswers[i] !== q.blanks[i]) correct = false;
  }
  dragScores[currentDragIndex] = correct;
  answered = true;
  updateProgress();
  updateDashboardStats();
  renderDrag();
};
window.prevDrag = function() { if (currentDragIndex > 0) { currentDragIndex--; resetCurrent(); renderDrag(); } };
window.nextDrag = function() { if (currentDragIndex < dragQuestions.length-1) { currentDragIndex++; resetCurrent(); renderDrag(); } };

// ==================== Single ====================
function renderSingle() {
  const q = singleQuestions[currentSingleIndex];
  const el = document.getElementById('quiz-area');
  let html = '<div class="card">';
  html += '<div class="card-subtitle">单选题 · 第 ' + (currentSingleIndex+1) + ' / ' + singleQuestions.length + ' 题</div>';
  html += '<div class="question-text">' + q.question + '</div>';
  html += '<div class="options">';
  q.options.forEach((opt, i) => {
    let cls = '';
    if (answered) {
      if (i === q.correct) cls = 'correct';
      else if (i === userSingleAnswer) cls = 'wrong';
      cls += ' disabled';
    } else if (i === userSingleAnswer) {
      cls = 'selected';
    }
    html += '<div class="option ' + cls + '" onclick="selectSingle(' + i + ')"><span class="option-letter">' + String.fromCharCode(65+i) + '</span><span class="option-text">' + opt + '</span></div>';
  });
  html += '</div>';
  html += '<div class="nav-btns">';
  html += '<button class="btn btn-secondary" onclick="prevSingle()" ' + (currentSingleIndex===0?'disabled':'') + '>上一题</button>';
  html += '<button class="btn" onclick="checkSingle()">提交</button>';
  html += '<button class="btn" onclick="nextSingle()">下一题</button>';
  html += '</div>';
  if (answered) {
    html += '<div class="score-display ' + (singleScores[currentSingleIndex]?'correct':'wrong') + '">' + (singleScores[currentSingleIndex]?'✅ 正确':'❌ 错误') + '</div>';
    html += '<div class="explanation show"><div class="explanation-title">解析</div><p>' + q.explanation + '</p>';
    if (q.detailLink) html += '<p><a href="' + q.detailLink + '" target="_blank">📄 查看笔记原文</a></p>';
    if (q.optionExplanations) {
      html += '<ul>';
      q.optionExplanations.forEach((oe, i) => {
        const isCorrect = i === q.correct;
        html += '<li><strong>' + String.fromCharCode(65+i) + (isCorrect ? ' ✅' : '') + ':</strong> ' + oe + '</li>';
      });
      html += '</ul>';
    }
    html += '</div>';
  }
  html += '</div>';
  el.innerHTML = html;
}
window.selectSingle = function(i) { if (answered) return; userSingleAnswer = i; renderSingle(); };
window.checkSingle = function() {
  if (userSingleAnswer === null) return;
  singleScores[currentSingleIndex] = (userSingleAnswer === singleQuestions[currentSingleIndex].correct);
  answered = true;
  updateProgress();
  updateDashboardStats();
  renderSingle();
};
window.prevSingle = function() { if (currentSingleIndex > 0) { currentSingleIndex--; resetCurrent(); renderSingle(); } };
window.nextSingle = function() { if (currentSingleIndex < singleQuestions.length-1) { currentSingleIndex++; resetCurrent(); renderSingle(); } };

// ==================== Multi ====================
function renderMulti() {
  const q = multiQuestions[currentMultiIndex];
  const el = document.getElementById('quiz-area');
  let html = '<div class="card">';
  html += '<div class="card-subtitle">多选题 · 第 ' + (currentMultiIndex+1) + ' / ' + multiQuestions.length + ' 题</div>';
  html += '<div class="question-text">' + q.question + '</div>';
  html += '<div class="options">';
  q.options.forEach((opt, i) => {
    let cls = '';
    const selected = userMultiAnswers.includes(i);
    if (answered) {
      const isCorrect = q.correct.includes(i);
      if (isCorrect) cls = 'correct';
      else if (selected) cls = 'wrong';
      cls += ' disabled';
    } else if (selected) {
      cls = 'selected';
    }
    html += '<div class="option ' + cls + '" onclick="toggleMulti(' + i + ')"><span class="option-letter">' + String.fromCharCode(65+i) + '</span><span class="option-text">' + opt + '</span></div>';
  });
  html += '</div>';
  html += '<div class="nav-btns">';
  html += '<button class="btn btn-secondary" onclick="prevMulti()" ' + (currentMultiIndex===0?'disabled':'') + '>上一题</button>';
  html += '<button class="btn" onclick="checkMulti()">提交</button>';
  html += '<button class="btn" onclick="nextMulti()">下一题</button>';
  html += '</div>';
  if (answered) {
    html += '<div class="score-display ' + (multiScores[currentMultiIndex]?'correct':'wrong') + '">' + (multiScores[currentMultiIndex]?'✅ 正确':'❌ 错误') + '</div>';
    html += '<div class="explanation show"><div class="explanation-title">解析</div><p>' + q.explanation + '</p>';
    if (q.detailLink) html += '<p><a href="' + q.detailLink + '" target="_blank">📄 查看笔记原文</a></p>';
    if (q.optionExplanations) {
      html += '<ul>';
      q.optionExplanations.forEach((oe, i) => {
        const isCorrect = q.correct.includes(i);
        html += '<li><strong>' + String.fromCharCode(65+i) + (isCorrect ? ' ✅' : '') + ':</strong> ' + oe + '</li>';
      });
      html += '</ul>';
    }
    html += '</div>';
  }
  html += '</div>';
  el.innerHTML = html;
}
window.toggleMulti = function(i) {
  if (answered) return;
  const idx = userMultiAnswers.indexOf(i);
  if (idx >= 0) userMultiAnswers.splice(idx, 1);
  else userMultiAnswers.push(i);
  userMultiAnswers.sort((a,b)=>a-b);
  renderMulti();
};
window.checkMulti = function() {
  if (!userMultiAnswers.length) return;
  const q = multiQuestions[currentMultiIndex];
  let correct = userMultiAnswers.length === q.correct.length;
  if (correct) {
    for (let i = 0; i < q.correct.length; i++) {
      if (userMultiAnswers[i] !== q.correct[i]) { correct = false; break; }
    }
  }
  multiScores[currentMultiIndex] = correct;
  answered = true;
  updateProgress();
  updateDashboardStats();
  renderMulti();
};
window.prevMulti = function() { if (currentMultiIndex > 0) { currentMultiIndex--; resetCurrent(); renderMulti(); } };
window.nextMulti = function() { if (currentMultiIndex < multiQuestions.length-1) { currentMultiIndex++; resetCurrent(); renderMulti(); } };

// ==================== True/False ====================
function renderTrueFalse() {
  const q = trueFalseQuestions[currentTFIndex];
  const el = document.getElementById('quiz-area');
  let html = '<div class="card">';
  html += '<div class="card-subtitle">判断题 · 第 ' + (currentTFIndex+1) + ' / ' + trueFalseQuestions.length + ' 题</div>';
  html += '<div class="question-text">' + q.statement + '</div>';
  html += '<div class="options">';
  const opts = ['正确', '错误'];
  opts.forEach((opt, i) => {
    const val = i === 0;
    let cls = '';
    if (answered) {
      if (val === q.correct) cls = 'correct';
      else if (val === userTFAnswer) cls = 'wrong';
      cls += ' disabled';
    } else if (val === userTFAnswer) {
      cls = 'selected';
    }
    html += '<div class="option ' + cls + '" onclick="selectTF(' + val + ')"><span class="option-text">' + opt + '</span></div>';
  });
  html += '</div>';
  html += '<div class="nav-btns">';
  html += '<button class="btn btn-secondary" onclick="prevTF()" ' + (currentTFIndex===0?'disabled':'') + '>上一题</button>';
  html += '<button class="btn" onclick="checkTF()">提交</button>';
  html += '<button class="btn" onclick="nextTF()">下一题</button>';
  html += '</div>';
  if (answered) {
    html += '<div class="score-display ' + (tfScores[currentTFIndex]?'correct':'wrong') + '">' + (tfScores[currentTFIndex]?'✅ 正确':'❌ 错误') + '</div>';
    html += '<div class="explanation show"><div class="explanation-title">解析</div><p>' + q.explanation + '</p>';
    if (q.detailLink) html += '<p><a href="' + q.detailLink + '" target="_blank">📄 查看笔记原文</a></p>';
    html += '</div>';
  }
  html += '</div>';
  el.innerHTML = html;
}
window.selectTF = function(val) { if (answered) return; userTFAnswer = val; renderTrueFalse(); };
window.checkTF = function() {
  if (userTFAnswer === null) return;
  tfScores[currentTFIndex] = (userTFAnswer === trueFalseQuestions[currentTFIndex].correct);
  answered = true;
  updateProgress();
  updateDashboardStats();
  renderTrueFalse();
};
window.prevTF = function() { if (currentTFIndex > 0) { currentTFIndex--; resetCurrent(); renderTrueFalse(); } };
window.nextTF = function() { if (currentTFIndex < trueFalseQuestions.length-1) { currentTFIndex++; resetCurrent(); renderTrueFalse(); } };

// ==================== Init ====================
initScores();
rebuildAllQuestions();
updateProgress();

// Tabs
document.querySelectorAll('.mode-tab').forEach(tab => {
  tab.addEventListener('click', () => switchMode(tab.dataset.mode));
});

// Dashboard
document.getElementById('dashboard-btn').addEventListener('click', toggleDashboard);

// Reshuffle
document.getElementById('reshuffle-btn').addEventListener('click', reshuffleAll);

// Start
switchMode('drag');

})();
</script>
</body>
</html>
